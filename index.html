      <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 5px;">
        <span style="color: #b0a0d0;">${formatNum(prog.current)}${unit} <span style="color:#6a5a8a;">из ${prog.target}${unit}</span></span>
        ${!isDone ? `<span style="color: ${s.color};">осталось ${formatNum(remaining)}${unit}</span>` : ''}
      </div>
      <div style="height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;">
        <div style="height: 100%; width: ${prog.pct}%; background: ${s.color}; box-shadow: 0 0 6px ${s.glow};"></div>
      </div>
    </div>`;
  }

  return `<div onclick="window.__app.closeModal()" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: flex-end; justify-content: center;"><div onclick="event.stopPropagation()" style="background: linear-gradient(180deg, #150a25, #0a0612); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; padding: 20px; position: relative; border-top: 3px solid ${s.color}; box-shadow: 0 -10px 40px ${s.glow};"><button onclick="window.__app.closeModal()" style="position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; padding: 0; width: 28px; height: 28px; border-radius: 50%; font-size: 16px;">✕</button><div style="display: flex; align-items: center; gap: 14px; margin: 8px 0 18px;"><div style="width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg, ${s.color}40, ${s.color}10); border: 1px solid ${s.color}; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 0 20px ${s.glow};">${s.emoji}</div><div><div style="font-size: 20px; color: #fff; font-weight: 700;">${s.name}</div><div style="font-size: 11px; color: ${s.color}; letter-spacing: 0.1em;">Уровень ${lvl} · ${sxp} XP${sh > 0 ? ` · ${sh.toFixed(1)} ч` : ''}</div></div></div>${stageProgressHtml}${contextHtml}${bodyHtml}${skillsHtml}${financeHtml}${addBlock}${tasksHtml}</div></div>`;
}

function renderStageModal() {
  const s = PATH.find(x => x.id === view.stageId);
  const unlocked = !!state.stagesUnlocked[s.id];
  const dp = daysPassed();
  const daysRem = Math.max(0, s.days - dp);
  const reflection = state.stageReflections?.[s.id] || '';
  let targetDate = '';
  if (state.startedAt) {
    const start = parseISO(state.startedAt);
    const target = new Date(start);
    target.setDate(target.getDate() + s.days);
    targetDate = formatDateLong(dateToISO(target));
  }

  let body = '';
  if (!unlocked) {
    const ready = isStageReady(s.id);
    const overall = stageOverallProgress(s.id);

    body = `<div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(167,139,250,0.2); border-radius: 12px; padding: 16px; margin-bottom: 14px;">

        <div style="font-size: 10px; letter-spacing: 0.25em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Что нужно сделать</div>
        <div style="font-size: 14px; color: ${ready ? '#10E891' : '#fff'}; font-weight: 800;">${overall}%</div>

      <div style="height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-bottom: 12px;">

      <div style="display: grid; grid-template-columns: 1fr; gap: 6px;">`;

      const unit = targetType === 'hours' ? ' ч' : '';
      const formatNum = n => targetType === 'hours' ? n.toFixed(1) : Math.round(n);
      const isDone = prog.pct >= 100;
      const remaining = Math.max(0, prog.target - prog.current);
      body += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${isDone ? sp.color + '60' : 'rgba(255,255,255,0.05)'}; border-left: 3px solid ${sp.color}; border-radius: 8px; padding: 10px 11px;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px;">
          <div style="display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1;">
            <span style="font-size: 16px; flex-shrink: 0;">${sp.emoji}</span>
            <span style="font-size: 12px; color: #fff; font-weight: 600;">${sp.name}</span>
            ${isDone ? '<span style="font-size: 10px; color: #10E891; font-weight: 700;">✓</span>' : ''}

function addSkillSession(skillId, subId, hours, date, note) {
  const sk = (state.skills || []).find(x => x.id === skillId);
  if (!sk) return;
  const sub = findSkillSub(sk, subId);
  const isInvert = sub && sub.invertGood;
  // Антиметрика: записываем как «случай», 0 XP, 0 часов в общий счётчик сферы
  const xp = isInvert ? 0 : xpForHours(hours);
  const hoursForHistory = isInvert ? 0 : hours;
  const title = `${sk.name}${sub ? ` — ${sub.name}` : ''}${isInvert ? ' [случай]' : ''}${note ? ` · ${note}` : ''}`;
  const sphereId = sk.sphereId || 'skills';
  state.history.push({
    id: Date.now().toString(),
    sphere: sphereId,
    title,
    taskKey: `skill_${skillId}_${subId || 'none'}`,
    skillId, subId,
    xp,
    hours: hoursForHistory,
    rawCount: isInvert ? hours : null,
    date: date || today(),
    timestamp: Date.now(),
    note: note || ''
  });

  // Тост о записи
  const sphere = SPHERES.find(s => s.id === sphereId);
  const prog = sphereProgressForStage(sphereId, currentStageId());
  let toastText;
  if (isInvert) {
    toastText = `⚠ ${sub.name} +${hours}`;
    showToast(toastText, '#FF3D71');
  } else {
    const targetType = SPHERE_TARGET_TYPE[sphereId];
    if (targetType === 'hours') {
      toastText = `${sphere.emoji} ${sphere.name} +${hours}ч → ${prog.current.toFixed(1)}/${prog.target}ч`;
    } else {
      toastText = `${sphere.emoji} ${sphere.name} +${hours}ч`;
    }
    showToast(toastText, sphere.color);
  }
  const stageUnlocked = checkUnlocks();
  const newAch = checkAchievements();
  save();
  if (stageUnlocked) {
    showCelebration('Этап открыт', 'Карта пути');
    setTimeout(() => { newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800)); }, 3200);
  } else if (newAch.length) {
    newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800));
  }
  render();
}

  },
  kbConfirmAdd: () => {
    const title = document.getElementById('kb-title-input').value.trim();
    const url = document.getElementById('kb-url-input').value.trim();
    if (!title) { alert('Введи название'); return; }
    if (!url) { alert('Введи ссылку на видео'); return; }
    if (!url.startsWith('http')) { alert('Ссылка должна начинаться с http:// или https://'); return; }
    const tagsRaw = document.getElementById('kb-tags-input').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const note = document.getElementById('kb-note-input').value.trim();
    kbAddItem({
      categoryId: window.__kbItemCatId || null,
      title, url, tags, note,
      preview: window.__kbNewPreview || null
    });
    view.kbAddingItem = false;
    window.__kbNewPreview = null;
    window.__kbItemCatId = null;
    render();
  },
  kbStartEdit: (itemId) => {
    view.kbEditingItem = itemId;
    render();
  },
  kbCancelEdit: () => { view.kbEditingItem = null; render(); },
  kbConfirmEdit: (itemId) => {
    const title = document.getElementById('kb-edit-title-' + itemId).value.trim();
    const url = document.getElementById('kb-edit-url-' + itemId).value.trim();
    const tagsRaw = document.getElementById('kb-edit-tags-' + itemId).value.trim();
    const note = document.getElementById('kb-edit-note-' + itemId).value.trim();
    const catSelect = document.getElementById('kb-edit-cat-' + itemId);
    const categoryId = catSelect ? (catSelect.value || null) : undefined;
    if (!title || !url) { alert('Название и ссылка обязательны'); return; }
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const updates = { title, url, tags, note };
    if (categoryId !== undefined) updates.categoryId = categoryId;
    kbUpdateItem(itemId, updates);
    view.kbEditingItem = null;
    render();
  },
  kbDeleteItem: (itemId) => kbRemoveItem(itemId),
  // === ВКЛАДКИ В БАЗЕ ===
  kbSetMode: (mode) => { view.kbMode = mode; render(); },
  // === ЖУРНАЛ ===
  journalSearch: (val) => {
    view.journalSearch = val;
    clearTimeout(window.__journalSearchTimer);
    window.__journalSearchTimer = setTimeout(() => render(), 250);
  },
  journalFilterSphere: (sphereId) => {
    view.journalSphereFilter = sphereId;
    render();
  },
  journalStartAdd: () => {
    view.journalAdding = true;
    view.journalEditingId = null;
    window.__journalSphereId = null;
    render();
  },
  journalStartEdit: (id) => {
    view.journalEditingId = id;
    view.journalAdding = false;
    const j = (state.journal || []).find(x => x.id === id);
    window.__journalSphereId = j ? j.sphereId : null;
    render();
  },
  journalCancel: () => {
    view.journalAdding = false;
    view.journalEditingId = null;
    window.__journalSphereId = null;
    render();
  },
  journalPickSphere: (sphereId) => {
    window.__journalSphereId = sphereId || null;
    document.querySelectorAll('#journal-sphere-pick button').forEach(b => {
      const myId = b.dataset.spid;
      const isActive = (myId || null) === (sphereId || null);
      const sp = myId ? SPHERES.find(s => s.id === myId) : null;
      const ac = sp ? sp.color : '#8870a8';
      b.style.background = isActive ? ac : 'transparent';
      b.style.color = isActive ? '#000' : '#b0a0d0';
      b.style.borderColor = isActive ? ac : (sp ? sp.color + '60' : 'rgba(255,255,255,0.1)');
    });
  },
  journalConfirm: () => {
    const title = document.getElementById('journal-title-input').value.trim();
    const content = document.getElementById('journal-content-input').value.trim();
    if (!title && !content) { alert('Заполни хотя бы заголовок или текст'); return; }
    const tagsRaw = document.getElementById('journal-tags-input').value.trim();
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const sphereId = window.__journalSphereId || null;
    if (view.journalEditingId) {
      journalUpdate(view.journalEditingId, { title, content, tags, sphereId });
      view.journalEditingId = null;
    } else {
      journalAdd({ title, content, tags, sphereId });
      view.journalAdding = false;
    }
    window.__journalSphereId = null;
    render();
  },
  journalDelete: (id) => journalRemove(id),
  journalView: (id) => {
    // Открыть полную запись на чтение через редактирование
    view.journalEditingId = id;
    render();
    setTimeout(() => {
      const ta = document.getElementById('journal-content-input');
      if (ta) ta.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  },
  // === ТЕЛО — вкладки и тренировки ===
  setBodyTab: (tab) => { view.bodyTab = tab; render(); },
  setWorkoutWeek: (idx) => { view.workoutWeek = idx; view.workoutDay = null; view.workoutEx = null; render(); },
  setWorkoutDay: (dayId) => {
    if (view.workoutDay === dayId) { view.workoutDay = null; view.workoutEx = null; }
    else { view.workoutDay = dayId; view.workoutEx = null; }
    render();
  },
  toggleWorkoutEx: (ei) => {
    view.workoutEx = view.workoutEx === ei ? null : ei;
    render();
  },
  toggleNutritionMeal: (mi) => {
    view.nutritionMeal = view.nutritionMeal === mi ? null : mi;
    render();
  },
  // === ТЕЛО — замеры ===
  bodyEditHeight: () => { view.bodyEditingHeight = true; render(); },
  bodyCancelHeight: () => { view.bodyEditingHeight = false; render(); },
  bodySaveHeight: () => {
    const v = parseFloat(document.getElementById('body-height-input').value);
    if (!v || v < 100 || v > 250) { alert('Введи корректный рост в см'); return; }
    bodySetHeight(v);
    view.bodyEditingHeight = false;
    render();
  },
  bodyStartAdd: () => { view.bodyAdding = true; render(); },
  bodyCancelAdd: () => { view.bodyAdding = false; render(); },
  bodyConfirm: () => {
    const date = document.getElementById('body-date-input').value || today();
    const weight = parseFloat(document.getElementById('body-weight-input').value) || null;
    const chest = parseFloat(document.getElementById('body-chest-input').value) || null;
    const waist = parseFloat(document.getElementById('body-waist-input').value) || null;
    const hips = parseFloat(document.getElementById('body-hips-input').value) || null;
    const biceps = parseFloat(document.getElementById('body-biceps-input').value) || null;
    const note = document.getElementById('body-note-input').value.trim();
    if (!weight && !chest && !waist && !hips && !biceps) { alert('Заполни хотя бы один параметр'); return; }
    bodyAddMeasurement({ date, weight, chest, waist, hips, biceps, note });
    view.bodyAdding = false;
    render();
  },
  bodyRemoveMeasurement: (id) => { bodyRemoveMeasurement(id); },
  // === КАЛЕНДАРЬ iPhone ===
  exportICal: () => exportICal(),
  // === Свёртки групп ===
  toggleGroup: (key) => {
    if (!view.expandedGroups) view.expandedGroups = {};
    view.expandedGroups[key] = !view.expandedGroups[key];
    render();
  }
};

load();
</script>
</body>
</html>
