function sphereProgressForStage(sphereId, stageId) {
  // Возвращает {current, target, pct, type} — сколько накоплено (часов или выполнений) с момента старта
  const target = (typeof adjustedTarget === 'function') ? adjustedTarget(sphereId, stageId) : (STAGE_TARGETS[stageId]?.[sphereId] || 0);

      current += (state.finance?.entries?.length || 0);
    }
  }
  const pct = target === 0 ? 100 : Math.min(100, (current / target) * 100);
  return { current, target, pct, type };
}

function isStageReady(stageId) {
  // Этап готов к открытию если все 6 сфер набрали свою норму

}

function stageOverallProgress(stageId) {
  // Общая готовность этапа = среднее по 6 сферам, ограниченное 100%

}

// === УРОВНИ ===
// 150 уровней. Шаг 1500 XP. Уровень 1 = Странник, Уровень 150 = Вершина.
// При ритме ~875 XP/неделю это даёт примерно 1 уровень за 2 недели.
const XP_PER_LEVEL = 1500;
const MAX_LEVEL = 150;

function levelInfo(xp) {
  const level = Math.min(MAX_LEVEL, Math.floor(xp / XP_PER_LEVEL) + 1);
  let name;
  if (level === 1) name = 'Странник';
  else if (level >= MAX_LEVEL) name = 'Вершина';
  else name = `Уровень ${level}`;
  const currentLevelXP = (level - 1) * XP_PER_LEVEL;
  const nextLevelXP = level >= MAX_LEVEL ? null : level * XP_PER_LEVEL;
  return { level, name, currentLevelXP, nextLevelXP };
}

// Совместимость со старым API: rank() возвращает {xp, name} для текущего уровня
const rank = xp => {
  const li = levelInfo(xp);
  return { xp: li.currentLevelXP, name: li.name, level: li.level };
};
const nextRank = xp => {
  const li = levelInfo(xp);
  if (li.nextLevelXP === null) return null;
  const nextLi = levelInfo(li.nextLevelXP);
  return { xp: li.nextLevelXP, name: nextLi.name, level: nextLi.level };
};

// === ОТЧЁТНЫЙ ПЕРИОД ===
// Первый период: с момента старта до конца того же месяца.
// Дальше: каждый календарный месяц с 1-го по последнее число.
function reportPeriodOf(dateISO) {
  // Возвращает {start, end} ISO строки для отчётного периода, в который попадает данная дата
  const startedAt = state?.startedAt || today();
  const startD = parseISO(startedAt);
  const targetD = parseISO(dateISO);

  // Месяц старта
  const startMonth = `${startD.getFullYear()}-${String(startD.getMonth() + 1).padStart(2, '0')}`;
  const targetMonth = `${targetD.getFullYear()}-${String(targetD.getMonth() + 1).padStart(2, '0')}`;

  if (targetMonth === startMonth && startD.getDate() > 1) {
    // Первый короткий период: от startedAt до конца месяца
    const lastDay = new Date(startD.getFullYear(), startD.getMonth() + 1, 0);
    return { start: startedAt, end: dateToISO(lastDay), isFirst: true };
  }
  // Обычный календарный месяц: 1-е — последнее число
  const first = new Date(targetD.getFullYear(), targetD.getMonth(), 1);
  const last = new Date(targetD.getFullYear(), targetD.getMonth() + 1, 0);
  return { start: dateToISO(first), end: dateToISO(last), isFirst: false };
}

function currentReportPeriod() {
  return reportPeriodOf(today());
}

// Прошлый отчётный период
function prevReportPeriod() {
  const cur = currentReportPeriod();
  const startD = parseISO(cur.start);
  // День перед началом текущего периода
  const dayBefore = new Date(startD); dayBefore.setDate(dayBefore.getDate() - 1);
  if (dayBefore < parseISO(state?.startedAt || today())) return null; // нет ещё прошлого
  return reportPeriodOf(dateToISO(dayBefore));
}

function formatReportPeriod(rp) {
  if (!rp) return '';
  const s = parseISO(rp.start), e = parseISO(rp.end);
  // Если оба числа в одном месяце и периoд начинается с 1-го — это полный месяц
  const isFullMonth = s.getDate() === 1 && e.getDate() === new Date(s.getFullYear(), s.getMonth() + 1, 0).getDate();
  if (isFullMonth) {
    const mn = MONTHS_RU[s.getMonth()];
    return `${mn.charAt(0).toUpperCase() + mn.slice(1)} ${s.getFullYear()}`;
  }
  // Короткий первый период
  return `${s.getDate()} ${MONTHS_RU_SHORT[s.getMonth()]} — ${e.getDate()} ${MONTHS_RU_SHORT[e.getMonth()]} ${e.getFullYear()}`;
}

function findSkillSub(skill, subId) {
  return (skill.subs || []).find(s => s.id === subId);
}

function skillStats(skillId, subId, period) {
  let entries = state.history.filter(h => h.skillId === skillId);
  if (subId) entries = entries.filter(h => h.subId === subId);
  if (period && period !== 'all') {
    entries = filterByPeriod(entries, period);
  }
  // Для антиметрики count = сумма rawCount; для обычных — длина массива
  const sk = (state.skills || []).find(x => x.id === skillId);
  const sub = sk && subId ? findSkillSub(sk, subId) : null;
  const isInvert = sub && sub.invertGood;
  let count;
  if (isInvert) {
    count = entries.reduce((s, h) => s + (h.rawCount || 1), 0);
  } else {
    count = entries.length;
  }
  const hours = entries.reduce((s, h) => s + (h.hours || 0), 0);
  const xp = entries.reduce((s, h) => s + h.xp, 0);
  const lastDate = entries.length ? [...entries].sort((a,b) => b.date.localeCompare(a.date))[0].date : null;
  return { count, hours, xp, lastDate };
}

window.__fxRates = window.__fxRates || null;
window.__fxFetching = false;

async function fetchFXRates(baseCurrency) {
  if (window.__fxFetching) return;
  window.__fxFetching = true;
  try {
    // Используем открытый API без ключа
    const res = await fetch(`https://api.frankfurter.app/latest?from=${baseCurrency}&to=USD,RUB,CLP,EUR`);
    if (!res.ok) throw new Error('FX API error');
    const data = await res.json();
    window.__fxRates = { base: baseCurrency, rates: { [baseCurrency]: 1, ...data.rates }, timestamp: Date.now() };
    // Обновляем конвертеры на странице если форма открыта
    updateFXDisplay();
  } catch (e) {
    console.warn('FX fetch failed:', e);
  } finally {
    window.__fxFetching = false;
  }
}

function updateFXDisplay() {
  const amountEl = document.getElementById('fin-amount');
  if (!amountEl) return;
  const amount = parseFloat(amountEl.value.replace(',', '.')) || 0;
  const base = state.finance?.currency || 'USD';
  const currencies = ['USD', 'RUB', 'CLP', 'EUR'];
  currencies.forEach(cur => {
    const el = document.getElementById('fx-' + cur);
    if (!el) return;
    if (cur === base) { el.textContent = amount.toFixed(cur === 'CLP' ? 0 : 2); return; }
    if (!window.__fxRates || window.__fxRates.base !== base) { el.textContent = '...'; return; }
    const rate = window.__fxRates.rates[cur];
    if (!rate) { el.textContent = '—'; return; }
    const converted = amount * rate;
    el.textContent = cur === 'CLP' ? Math.round(converted).toLocaleString() : converted.toFixed(2);
  });
}

function dateToISO(d) { return d.toISOString().slice(0, 10); }

// Форматирует "26 апр 2026" или "сегодня", "вчера", "5 дней назад"
function formatDateRelative(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return 'сегодня';
  if (diff === 1) return 'вчера';
  if (diff > 0 && diff < 7) return `${diff} ${plural(diff, 'день', 'дня', 'дней')} назад`;
  return `${d.getDate()} ${MONTHS_RU_SHORT[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateLong(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  return `${d.getDate()} ${MONTHS_RU[d.getMonth()]} ${d.getFullYear()}`;
}

function formatDateShort(iso) {
  if (!iso) return '';
  const d = parseISO(iso);
  return `${d.getDate()} ${MONTHS_RU_SHORT[d.getMonth()]}`;
}

// День недели для даты, понедельник = 0
function weekdayMon(d) { return (d.getDay() + 6) % 7; }

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
  return many;
}

function calcStreak(history) {
  if (!history.length) return 0;
  const days = [...new Set(history.map(h => h.date))].sort().reverse();
  let s = 0;
  let d = new Date();
  if (days[0] !== today()) {
    d.setDate(d.getDate() - 1);
    if (days[0] !== d.toISOString().slice(0, 10)) return 0;
  }
  for (const day of days) {
    if (day === d.toISOString().slice(0, 10)) { s++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return s;
}

function calcMaxStreak(history) {
  if (!history.length) return 0;
  const days = [...new Set(history.map(h => h.date))].sort();
  let max = 1, cur = 1;
  for (let i = 1; i < days.length; i++) {
    const prev = new Date(days[i - 1]); prev.setDate(prev.getDate() + 1);
    if (prev.toISOString().slice(0, 10) === days[i]) { cur++; max = Math.max(max, cur); }
    else cur = 1;
  }
  return max;
}

// Добавляет недостающие обязательные задачи в state.tasks (для миграции существующих пользователей)
// Также обновляет заголовки/частоту обязательных задач если они изменились в коде
function ensureMandatoryTasks() {
  Object.keys(MANDATORY_TASKS).forEach(sphereId => {
    if (!state.tasks[sphereId]) state.tasks[sphereId] = [];
    const validKeys = MANDATORY_TASKS[sphereId].map(m => m.mandatoryKey);
    // Удаляем устаревшие обязательные задачи (которые когда-то были, а теперь нет в MANDATORY_TASKS)
    state.tasks[sphereId] = state.tasks[sphereId].filter(t => {
      if (!t.mandatory) return true; // не обязательные оставляем
      return validKeys.includes(t.mandatoryKey || t.taskKey);
    });
    MANDATORY_TASKS[sphereId].forEach(mt => {
      const existing = state.tasks[sphereId].find(t => t.mandatoryKey === mt.mandatoryKey || t.taskKey === mt.mandatoryKey);
      if (!existing) {
        state.tasks[sphereId].push({
          id: `mand_${mt.mandatoryKey}`,
          taskKey: mt.mandatoryKey,
          mandatory: true,
          createdAt: today(),
          ...mt
        });
      } else {
        existing.mandatory = true;
        existing.title = mt.title;
        existing.type = mt.type;
        existing.repeating = mt.repeating;
        if (mt.difficulty) existing.difficulty = mt.difficulty;
        if (mt.hours) existing.hours = mt.hours;
        if (!existing.taskKey) existing.taskKey = mt.mandatoryKey;
      }
    });
  });
}

// Сжимает изображение через canvas до миниатюры (max 320×180px JPEG ~70%)
// Возвращает Promise с base64 строкой
function compressImageToBase64(file, maxW = 320, maxH = 180, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Не могу прочитать файл'));
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => reject(new Error('Это не изображение'));
      img.onload = () => {
        let w = img.width, h = img.height;
        const ratio = Math.min(maxW / w, maxH / h, 1);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        try {
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch (err) {
          reject(err);
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// === ВРЕМЯ МОЛИТВ ===
async function fetchPrayerTimes(dateISO) {
  // API: aladhan.com — публичное, без ключа. Метод 4 = Умм аль-Кура (хорошо для региона)
  const cache = state.prayerTimes.cache;
  if (cache[dateISO]) return cache[dateISO];
  const lat = state.prayerTimes.lat;
  const lon = state.prayerTimes.lon;
  const [y, m, d] = dateISO.split('-');
  const url = `https://api.aladhan.com/v1/timings/${d}-${m}-${y}?latitude=${lat}&longitude=${lon}&method=2`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();
    const t = data.data.timings;
    const result = {
      fajr: t.Fajr,
      sunrise: t.Sunrise,
      dhuhr: t.Dhuhr,
      asr: t.Asr,
      maghrib: t.Maghrib,
      isha: t.Isha
    };
    state.prayerTimes.cache[dateISO] = result;
    save();
    return result;
  } catch (e) {
    console.warn('prayer times fetch failed', e);
    return null;
  }
}

function timeStringToMinutes(t) {
  if (!t) return null;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function getNextPrayerInfo(times) {
  if (!times) return null;
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const prayers = [
    { id: 'fajr', name: 'Фаджр', time: times.fajr },
    { id: 'sunrise', name: 'Восход', time: times.sunrise, isInfo: true },
    { id: 'dhuhr', name: 'Зухр', time: times.dhuhr },
    { id: 'asr', name: 'Аср', time: times.asr },
    { id: 'maghrib', name: 'Магриб', time: times.maghrib },
    { id: 'isha', name: 'Иша', time: times.isha }
  ];
  for (const p of prayers) {
    const pm = timeStringToMinutes(p.time);
    if (pm !== null && pm > nowMin) {
      const diff = pm - nowMin;
      const h = Math.floor(diff / 60);
      const min = diff % 60;
      return { prayer: p, hoursLeft: h, minutesLeft: min };
    }
  }
  return null; // все молитвы дня прошли
}

}

// === АДАПТИВНЫЕ НОРМЫ (-10% при слабых неделях) ===
// Возвращает скорректированный таргет с учётом adjustments
function adjustedTarget(sphereId, stageId) {
  const base = STAGE_TARGETS[stageId]?.[sphereId] || 0;
  const adj = state.adaptive?.adjustments?.[sphereId]?.[stageId];
  if (!adj) return base;
  return Math.round(base * (1 + adj));
}

function applyWeaknessAdaptation(sphereId, stageId) {
  if (!state.adaptive) state.adaptive = { adjustments: {} };
  if (!state.adaptive.adjustments[sphereId]) state.adaptive.adjustments[sphereId] = {};
  const current = state.adaptive.adjustments[sphereId][stageId] || 0;
  if (current <= -0.1) return; // уже снижали — больше не двигаем (фиксируем на -10%)
  state.adaptive.adjustments[sphereId][stageId] = -0.1;
  save();
  const sphere = SPHERES.find(s => s.id === sphereId);
  if (sphere) showToast(`⚠ ${sphere.name}: норма снижена на 10% — было слабовато 4 недели`, '#FFAA00');
}

// Анализ: смотрим на последние 4 недели для текущего этапа.
// Если по сфере темп ниже того что нужно для дотяжки до конца этапа — применяем -10%.
function checkAdaptiveNorms() {
  const stageId = currentStageId();
  if (stageId === 's0') return;
  const stage = PATH.find(s => s.id === stageId);
  const prevStage = PATH[PATH.indexOf(stage) - 1];
  if (!stage || !prevStage) return;

  const dp = daysPassed();
  // Считаем темп только если прошло хотя бы 28 дней с начала этапа
  const stageStartDays = prevStage.days;
  const daysIntoStage = dp - stageStartDays;
  if (daysIntoStage < 28) return;

  SPHERES.forEach(sp => {
    const baseTarget = STAGE_TARGETS[stageId][sp.id] || 0;
    if (baseTarget === 0) return;
    const prog = sphereProgressForStage(sp.id, stageId);
    // Сколько должно было быть к этому моменту по линейному графику
    const expectedRatio = daysIntoStage / (stage.days - stageStartDays);
    const expected = baseTarget * expectedRatio;
    const actual = prog.current;
    // Если фактическое меньше 90% от ожидаемого — слабая ветка
    if (actual < expected * 0.9) {
      applyWeaknessAdaptation(sp.id, stageId);
    }
  });
}

  if (!state.tasks) state = makeInitial();
  if (!state.achievementsUnlocked) state.achievementsUnlocked = {};
  if (state.lastBackup === undefined) state.lastBackup = null;
  if (state.bannerDismissedDate === undefined) state.bannerDismissedDate = null;
  if (!state.finance) state.finance = { entries: [], cushion: 0, currency: 'USD' };
  if (!state.finance.entries) state.finance.entries = [];
  if (state.finance.cushion === undefined) state.finance.cushion = 0;
  if (!state.finance.currency) state.finance.currency = 'USD';
  if (!state.skills) {
    state.skills = [];
  }
  // Существующим навыкам без sphereId — назначаем 'skills'
  state.skills.forEach(sk => { if (!sk.sphereId) sk.sphereId = 'skills'; });
  // Удаляем устаревший навык флит-менеджмента (теперь в карьере просто часы рабочего дня)

  if (!state.skills.find(sk => sk.id === 'spanish')) {
    state.skills.push({
      id: 'spanish',
      name: 'Испанский',
      type: 'language',
      target: 'B2',
      sphereId: 'skills',
      color: '#FFAA00',
      icon: '🇪🇸',
      createdAt: today(),
      subs: JSON.parse(JSON.stringify(SKILL_TYPES.language.defaultSubs))
    });
  }
  SPHERES.forEach(s => {
    if (!state.tasks[s.id]) state.tasks[s.id] = [];
    if (!state.context[s.id]) state.context[s.id] = {};

  });
  // База знаний
  if (!state.knowledgeBase) state.knowledgeBase = { categories: [], items: [] };

  render();
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }

function totalXP() { return state.history.reduce((s, h) => s + h.xp, 0); }
function totalHours() { return state.history.reduce((s, h) => s + (h.hours || 0), 0); }
function sphereXP(id) { return state.history.filter(h => h.sphere === id).reduce((s, h) => s + h.xp, 0); }
function sphereHours(id) { return state.history.filter(h => h.sphere === id).reduce((s, h) => s + (h.hours || 0), 0); }
function daysPassed() { return Math.max(0, daysBetween(state.startedAt || today(), today())); }

// Фильтр истории по периоду
function filterByPeriod(entries, period) {
  if (period === 'all') return entries;
  if (period === 'today') return entries.filter(h => h.date === today());
  if (period === 'week') {
    const wkAgo = new Date(); wkAgo.setDate(wkAgo.getDate() - 7);
    const wkAgoStr = dateToISO(wkAgo);
    return entries.filter(h => h.date >= wkAgoStr);
  }
  if (period === 'month') {
    const m = currentMonth();
    return entries.filter(h => h.date.startsWith(m));
  }
  if (period === 'report') {
    const rp = currentReportPeriod();
    return entries.filter(h => isInReportPeriod(h.date, rp));
  }
  if (period === 'prev_report') {
    const rp = prevReportPeriod();
    if (!rp) return [];
    return entries.filter(h => isInReportPeriod(h.date, rp));
  }
  if (period === 'custom') {
    const from = view.customFrom; const to = view.customTo;
    if (!from && !to) return entries;
    return entries.filter(h => (!from || h.date >= from) && (!to || h.date <= to));
  }
  return entries;
}

function taskStats(taskKey, period) {
  let entries = state.history.filter(h => h.taskKey === taskKey);
  entries = filterByPeriod(entries, period);
  const count = entries.length;
  const hours = entries.reduce((s, h) => s + (h.hours || 0), 0);
  const xp = entries.reduce((s, h) => s + h.xp, 0);
  const lastDate = entries.length ? entries[entries.length - 1].date : null;
  return { count, hours, xp, lastDate };
}

// Активность по дням (для тепловой карты и точек)
function activityByDay(taskKey) {
  const map = {};
  const filtered = taskKey ? state.history.filter(h => h.taskKey === taskKey) : state.history;
  filtered.forEach(h => {
    if (!map[h.date]) map[h.date] = { count: 0, hours: 0, xp: 0 };
    map[h.date].count++;
    map[h.date].hours += (h.hours || 0);
    map[h.date].xp += h.xp;
  });
  return map;
}

function getSnapshot() {
  const sphereXPMap = {};
  SPHERES.forEach(s => sphereXPMap[s.id] = sphereXP(s.id));
  return { onboardingDone: state.onboardingDone, history: state.history, stagesUnlocked: state.stagesUnlocked, sphereXP: sphereXPMap, maxStreak: calcMaxStreak(state.history), totalHours: totalHours() };
}

function checkAchievements() {
  const snap = getSnapshot();
  const newly = [];
  ACHIEVEMENTS.forEach(a => {
    if (state.achievementsUnlocked[a.id]) return;
    if (a.cond(snap)) { state.achievementsUnlocked[a.id] = today(); newly.push(a); }
  });
  return newly;
}

function checkUnlocks() {
  const dp = daysPassed();
  // Проверяем адаптацию (раз в выполнение задачи — не накладно)
  if (typeof checkAdaptiveNorms === 'function') checkAdaptiveNorms();
  let unlocked = false;
  PATH.forEach(s => {
    if (state.stagesUnlocked[s.id]) return;
    if (dp >= s.days && isStageReady(s.id)) {
      state.stagesUnlocked[s.id] = today();
      unlocked = true;
    }
  });
  return unlocked;
}

function showCelebration(title, subtitle) {
  const el = document.createElement('div');

  el.innerHTML = `<div style="text-align: center; animation: cel-pop 0.8s;"><div style="font-size: 80px; background: linear-gradient(135deg,#A78BFA,#FF4DD8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✦</div><div style="font-size: 11px; color: #A78BFA; letter-spacing: 0.4em; text-transform: uppercase; margin-top: 4px;">${subtitle || ''}</div><div style="font-size: 22px; color: #fff; letter-spacing: 0.05em; margin-top: 8px; font-weight: 600;">${title}</div></div>`;
  document.body.appendChild(el);

}

function showToast(text, color) {
  const el = document.createElement('div');
  el.style.cssText = `position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px); padding: 10px 16px; background: ${color || '#A78BFA'}; color: #000; font-size: 13px; font-weight: 700; border-radius: 10px; box-shadow: 0 4px 20px ${color || 'rgba(167,139,250,0.5)'}; z-index: 9998; opacity: 0; transition: all 0.3s; pointer-events: none; max-width: 90vw; text-align: center;`;
  el.textContent = text;
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = 'translateX(-50%) translateY(0)';
  });
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(-20px)';
    setTimeout(() => el.remove(), 300);
  }, 2000);
}

function completeTask(sphereId, task, customHours) {
  let xp, hours;
  if (task.type === 'hours') {
    hours = customHours || task.hours || 1;
    xp = xpForHours(hours);
  } else {
    xp = xpFor(task.difficulty);
    hours = 0;
  }
  state.history.push({ id: Date.now().toString(), sphere: sphereId, title: task.title, taskKey: task.taskKey || task.id, xp, hours, date: today(), timestamp: Date.now() });
  if (!task.repeating) state.tasks[sphereId] = state.tasks[sphereId].filter(t => t.id !== task.id);

  // Тост: что именно записалось в сферу
  const sphere = SPHERES.find(s => s.id === sphereId);
  const targetType = SPHERE_TARGET_TYPE[sphereId];
  const prog = sphereProgressForStage(sphereId, currentStageId());
  let toastText;
  if (targetType === 'hours') {
    toastText = `${sphere.emoji} ${sphere.name} +${hours}ч → ${prog.current.toFixed(1)}/${prog.target}ч`;
  } else {
    toastText = `${sphere.emoji} ${sphere.name} +1 → ${prog.current}/${prog.target}`;
  }
  showToast(toastText, sphere.color);

  const stageUnlocked = checkUnlocks();
  const newAch = checkAchievements();
  save();
  if (stageUnlocked) {
    showCelebration('Этап открыт', 'Карта пути');
    setTimeout(() => { newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800)); }, 3200);
  } else if (newAch.length) {
    newAch.forEach((a, i) => setTimeout(() => showCelebration(a.name, 'Достижение'), i * 1800));
  }
  render();
}

function currentStageId() {
  const idx = PATH.findIndex(s => !state.stagesUnlocked[s.id]);
  if (idx === -1) return PATH[PATH.length - 1].id;
  return PATH[idx].id;
}

function undoTask(historyId) {
  state.history = state.history.filter(h => h.id !== historyId);
  // Пересчитываем открытые этапы — если уже не дотягиваем по нормам, откатываем
  const dp = daysPassed();
  Object.keys(state.stagesUnlocked).forEach(sid => {
    if (sid === 's0') return;
    const stage = PATH.find(s => s.id === sid);
    if (!stage) return;
    if (dp < stage.days || !isStageReady(sid)) {
      delete state.stagesUnlocked[sid];
    }
  });
  const snap = getSnapshot();
  Object.keys(state.achievementsUnlocked).forEach(aid => {
    const a = ACHIEVEMENTS.find(x => x.id === aid);
    if (a && !a.cond(snap)) delete state.achievementsUnlocked[aid];
  });
  save(); render();
}

function addTask(sphereId, taskData) {
  const id = Date.now().toString();
  state.tasks[sphereId].push({ id, taskKey: id, ...taskData, createdAt: today() });
  save(); render();
}

function removeTask(sphereId, taskId) {
  const task = (state.tasks[sphereId] || []).find(t => t.id === taskId);
  if (task && task.mandatory) {
    alert('Эту задачу нельзя удалить — она обязательная.');
    return;
  }
  state.tasks[sphereId] = state.tasks[sphereId].filter(t => t.id !== taskId);
  save(); render();
}

function resetAll() {
  if (!confirm('Стереть весь прогресс? Контекст из разговора восстановится. Отменить нельзя.')) return;

}

// Экспорт обязательных задач как iCalendar файл (.ics) — для импорта в календарь iPhone
function exportICal() {
  const lines = [];
  lines.push('BEGIN:VCALENDAR');
  lines.push('VERSION:2.0');
  lines.push('PRODID:-//Карта пути//RU');
  lines.push('CALSCALE:GREGORIAN');
  lines.push('METHOD:PUBLISH');
  lines.push('X-WR-CALNAME:Карта пути');
  lines.push('X-WR-TIMEZONE:America/Santiago');

  const start = parseISO(state.startedAt || today());
  const startStr = `${start.getFullYear()}${String(start.getMonth() + 1).padStart(2, '0')}${String(start.getDate()).padStart(2, '0')}`;
  const dtstamp = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';

  // Получаем времена молитв на сегодня для расписания (если есть в кэше)
  const todayTimes = state.prayerTimes?.cache?.[today()];

  const escIcs = (s) => String(s || '').replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\n/g, '\\n');

  // Молитвы — каждый день, с временами если есть
  const prayerSchedule = [
    { key: 'religion_tahajjud', name: 'Тахаджут', defaultHM: '05:00' },
    { key: 'religion_fajr', name: 'Фаджр', defaultHM: '06:00', timesKey: 'fajr' },
    { key: 'religion_duha', name: 'Духа', defaultHM: '08:00' },
    { key: 'religion_dhuhr', name: 'Зухр', defaultHM: '13:00', timesKey: 'dhuhr' },
    { key: 'religion_asr', name: 'Аср', defaultHM: '16:30', timesKey: 'asr' },
    { key: 'religion_maghrib', name: 'Магриб', defaultHM: '19:00', timesKey: 'maghrib' },
    { key: 'religion_isha', name: 'Иша', defaultHM: '20:30', timesKey: 'isha' }
  ];

  prayerSchedule.forEach(p => {
    const hm = (todayTimes && p.timesKey ? todayTimes[p.timesKey] : null) || p.defaultHM;
    const [hh, mm] = hm.split(':');
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${p.key}@karta-puti`);
    lines.push(`DTSTAMP:${dtstamp}`);
    lines.push(`DTSTART;TZID=America/Santiago:${startStr}T${hh}${mm}00`);
    lines.push(`DTEND;TZID=America/Santiago:${startStr}T${hh}${mm}00`);
    lines.push('RRULE:FREQ=DAILY');
    lines.push(`SUMMARY:☾ ${escIcs(p.name)}`);
    lines.push('DESCRIPTION:Молитва · Карта пути');
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT5M');
    lines.push('ACTION:DISPLAY');
    lines.push(`DESCRIPTION:${escIcs(p.name)} через 5 минут`);
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });

  // Тренировки — 3 раза в неделю силовая (пн, ср, пт), 3 раза суставы (вт, чт, сб)
  const addWeeklyEvent = (uid, name, byday, hm = '18:00') => {
    const [hh, mm] = hm.split(':');
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${uid}@karta-puti`);
    lines.push(`DTSTAMP:${dtstamp}`);
    lines.push(`DTSTART;TZID=America/Santiago:${startStr}T${hh}${mm}00`);
    lines.push(`DTEND;TZID=America/Santiago:${startStr}T${hh}${mm}00`);
    lines.push(`RRULE:FREQ=WEEKLY;BYDAY=${byday}`);
    lines.push(`SUMMARY:${escIcs(name)}`);
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT15M');
    lines.push('ACTION:DISPLAY');
    lines.push(`DESCRIPTION:${escIcs(name)} через 15 минут`);
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  };

  addWeeklyEvent('body_strength', '⚡ Силовая тренировка', 'MO,WE,FR', '18:00');
  addWeeklyEvent('body_joints', '⚡ Тренировка суставов', 'TU,TH,SA', '18:00');

  // Связи — раз в неделю в субботу обзвон (твоё пожелание)
  addWeeklyEvent('love_calls', '♥ Обзвон родных (мама, папа, Артур, Арсен, жена)', 'SA', '11:00');
  // Али раз в месяц
  lines.push('BEGIN:VEVENT');
  lines.push('UID:love_ali@karta-puti');
  lines.push(`DTSTAMP:${dtstamp}`);
  lines.push(`DTSTART;TZID=America/Santiago:${startStr}T11:00:00`);
  lines.push(`DTEND;TZID=America/Santiago:${startStr}T11:00:00`);
  lines.push('RRULE:FREQ=MONTHLY;BYDAY=1SA');
  lines.push('SUMMARY:♥ Связаться с Али (брат жены)');
  lines.push('END:VEVENT');
  // Родители жены раз в 2 месяца
  lines.push('BEGIN:VEVENT');
  lines.push('UID:love_wife_parents@karta-puti');
  lines.push(`DTSTAMP:${dtstamp}`);
  lines.push(`DTSTART;TZID=America/Santiago:${startStr}T11:00:00`);
  lines.push(`DTEND;TZID=America/Santiago:${startStr}T11:00:00`);
  lines.push('RRULE:FREQ=MONTHLY;INTERVAL=2;BYDAY=1SA');
  lines.push('SUMMARY:♥ Связаться с родителями жены');
  lines.push('END:VEVENT');

  // Финансы — раз в неделю воскресенье
  addWeeklyEvent('money_pnl', '◈ Записать траты и доходы за неделю', 'SU', '20:00');

  lines.push('END:VCALENDAR');
  const ics = lines.join('\r\n');
  const blob = new Blob([ics], { type: 'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `karta-puti-${today()}.ics`; a.click();
  URL.revokeObjectURL(url);
  showToast('📅 Календарь скачан — открой и импортируй в Календарь iPhone', '#A78BFA');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.tasks || !data.history) throw new Error('invalid');
      if (!confirm('Загрузить резервную копию? Текущие данные будут заменены.')) return;
      state = data; save(); render(); alert('Данные загружены!');
    } catch { alert('Файл повреждён или неверного формата.'); }
  };
  reader.readAsText(file);
}

function shouldShowBackupBanner() {
  if (state.history.length === 0) return false;
  const t = today();
  if (state.lastBackup === t) return false;
  if (state.bannerDismissedDate === t) return false;
  if (!state.lastBackup) {
    const daysSinceStart = daysBetween(state.startedAt, t);
    return daysSinceStart >= 1;
  }
  return daysBetween(state.lastBackup, t) >= 1;
}

function dismissBanner() { state.bannerDismissedDate = today(); save(); render(); }

function escapeHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function render() {
  const root = document.getElementById('app-root');
  if (!state) { root.innerHTML = '<div style="padding: 60px 20px; text-align: center; color: #888;">Загрузка...</div>'; return; }
  if (!state.onboardingDone) { renderOnboarding(); return; }
  renderApp();
  // После рендера — асинхронно обновляем плашку молитв
  setTimeout(() => updatePrayerStrip(), 100);
}

async function updatePrayerStrip() {
  const el = document.getElementById('prayer-strip-text');
  if (!el) return;
  try {
    const todayTimes = await fetchPrayerTimes(today());
    if (!todayTimes) {
      el.innerHTML = `<span style="color:#FFAA00;">не удалось загрузить</span>`;
      return;
    }
    const next = getNextPrayerInfo(todayTimes);
    if (next) {
      const p = next.prayer;
      const left = next.hoursLeft > 0
        ? `${next.hoursLeft}ч ${next.minutesLeft}мин`
        : `${next.minutesLeft}мин`;
      el.innerHTML = `<span style="color:#fff;font-weight:700;">${p.name}</span> в <span style="color:#10E891;">${p.time}</span> · через ${left}`;
    } else {
      // Все прошли — показываем времена на завтра
      const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const tomorrowTimes = await fetchPrayerTimes(dateToISO(tomorrowDate));
      if (tomorrowTimes) {
        el.innerHTML = `Сегодня все прошли · завтра Фаджр в <span style="color:#10E891;">${tomorrowTimes.fajr}</span>`;
      } else {
        el.innerHTML = 'Молитвы дня прошли';
      }
    }
  } catch (e) {
    el.innerHTML = `<span style="color:#8870a8;">офлайн</span>`;
  }
}

      </div>

        ${ready && enoughTime ? '<span style="color:#10E891; font-weight:700;">✓ Все сферы готовы и срок прошёл — этап откроется при следующем действии</span>' : ready && !enoughTime ? `<span style="color:#FFAA00;">Все сферы дотянулись, ждём ${cur.days - dp} ${plural(cur.days - dp, 'день', 'дня', 'дней')} времени</span>` : enoughTime ? '<span style="color:#FF4DD8;">Срок прошёл, но не все сферы дотянулись. Подтяни отстающие.</span>' : `<span>${cur.days - dp} ${plural(cur.days - dp, 'день', 'дня', 'дней')} до срока, и подтянуть отстающие сферы</span>`}
      </div>
      <div style="display: grid; grid-template-columns: 1fr; gap: 6px;">`;

    SPHERES.forEach(sp => {
      const prog = sphereProgressForStage(sp.id, cur.id);
      const targetType = SPHERE_TARGET_TYPE[sp.id];
      const unit = targetType === 'hours' ? 'ч' : '';
      const formatNum = n => targetType === 'hours' ? n.toFixed(1) : Math.round(n);
      const isDone = prog.pct >= 100;
      html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${isDone ? sp.color + '60' : 'rgba(255,255,255,0.05)'}; border-left: 3px solid ${sp.color}; border-radius: 8px; padding: 9px 11px;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 5px;">
          <div style="display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1;">
            <span style="font-size: 16px; flex-shrink: 0;">${sp.emoji}</span>
            <span style="font-size: 12px; color: #fff; font-weight: 600;">${sp.name}</span>
            ${isDone ? '<span style="font-size: 10px; color: #10E891; font-weight: 700;">✓</span>' : ''}
          </div>
          <div style="text-align: right; flex-shrink: 0;">
            <div style="font-size: 12px; color: ${isDone ? '#10E891' : '#fff'}; font-weight: 700; line-height: 1;">${formatNum(prog.current)}${unit} <span style="color:#6a5a8a; font-weight: 400;">/ ${prog.target}${unit}</span></div>
            <div style="font-size: 9px; color: ${isDone ? '#10E891' : sp.color}; margin-top: 2px;">${Math.round(prog.pct)}%</div>
          </div>
        </div>
        <div style="height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;">
          <div style="height: 100%; width: ${prog.pct}%; background: ${sp.color}; box-shadow: 0 0 6px ${sp.glow};"></div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }

  html += '<div style="position: relative; padding-left: 40px;"><div style="position: absolute; left: 18px; top: 14px; bottom: 14px; width: 2px; background: linear-gradient(180deg, #A78BFA 0%, rgba(167,139,250,0.1) 100%); box-shadow: 0 0 8px rgba(167,139,250,0.5);"></div>';

  PATH.forEach((s, i) => {
    const unlocked = !!state.stagesUnlocked[s.id];
    const isCurrent = i === currentIdx;
    const isFog = !unlocked && !isCurrent;
    const isFarFog = isFog && i > currentIdx + 1;
    let targetDate = '';
    if (state.startedAt) {
      const start = parseISO(state.startedAt);
      const target = new Date(start);
      target.setDate(target.getDate() + s.days);
      targetDate = `~${target.getDate()} ${MONTHS_RU_SHORT[target.getMonth()]} ${target.getFullYear()}`;
    }

    html += `<div style="position: relative; margin-bottom: 16px;"><div style="position: absolute; left: -32px; top: 8px; width: 26px; height: 26px; border-radius: 50%; background: ${unlocked ? 'linear-gradient(135deg,#A78BFA,#FF4DD8)' : isCurrent ? '#150a25' : '#0a0612'}; border: 2px solid ${unlocked ? '#A78BFA' : isCurrent ? '#A78BFA' : 'rgba(167,139,250,0.2)'}; display: flex; align-items: center; justify-content: center; box-shadow: ${unlocked || isCurrent ? '0 0 14px rgba(167,139,250,0.7)' : 'none'};"><span style="color: ${unlocked ? '#fff' : isCurrent ? '#A78BFA' : '#5a4a78'}; font-size: 12px; font-weight: 700;">${unlocked ? '✓' : isCurrent ? '◉' : '·'}</span></div><button onclick="window.__app.openStage('${s.id}')" style="width: 100%; text-align: left; background: ${unlocked ? 'linear-gradient(135deg, rgba(167,139,250,0.15), rgba(255,77,216,0.05))' : isCurrent ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.015)'}; border: 1px solid ${unlocked ? 'rgba(167,139,250,0.4)' : isCurrent ? 'rgba(167,139,250,0.3)' : 'rgba(255,255,255,0.05)'}; border-radius: 12px; padding: 14px 16px; cursor: pointer; opacity: ${isFog ? 0.45 : 1}; ${isFarFog ? 'filter: blur(0.5px);' : ''}"><div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px;"><div style="font-size: 15px; color: ${unlocked || isCurrent ? '#fff' : '#5a4a78'}; font-weight: 600;">${isFarFog ? '∙∙∙∙∙∙∙∙∙∙∙∙' : escapeHtml(s.title)}</div><div style="font-size: 10px; color: #8870a8; letter-spacing: 0.05em; white-space: nowrap; margin-left: 8px;">${targetDate || ''}</div></div>${(unlocked || isCurrent) ? `<div style="font-size: 12px; color: #b0a0d0; line-height: 1.5;">${escapeHtml(s.hint)}</div>` : ''}${unlocked && state.stagesUnlocked[s.id] ? `<div style="font-size: 10px; color: #A78BFA; margin-top: 6px;">✓ Открыто ${formatDateRelative(state.stagesUnlocked[s.id])}</div>` : ''}</button></div>`;
  });
  html += '</div>';
  return html;
}

// === КАЛЕНДАРНАЯ ТЕПЛОВАЯ КАРТА ===
function renderHeatmapMonth(monthStr, taskKey, sphereColor) {
  const [year, month] = monthStr.split('-').map(Number);
  const firstDay = new Date(year, month - 1, 1);
  const lastDay = new Date(year, month, 0);
  const daysInMonth = lastDay.getDate();
  const startWeekday = weekdayMon(firstDay);

  const activity = activityByDay(taskKey);
  const color = sphereColor || '#A78BFA';

  // Определяем максимум для нормализации
  let maxCount = 0;
  Object.keys(activity).forEach(d => {
    if (d.startsWith(monthStr) && activity[d].count > maxCount) maxCount = activity[d].count;
  });
  if (maxCount === 0) maxCount = 1;

  let html = `<div style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; margin-bottom: 14px;">`;
  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
    <button onclick="window.__app.shiftMonth(-1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">‹</button>
    <div style="font-size: 13px; color: #fff; font-weight: 600;">${MONTHS_RU[month-1]} ${year}</div>
    <button onclick="window.__app.shiftMonth(1)" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; width: 28px; height: 28px; border-radius: 8px; font-size: 14px;">›</button>
  </div>`;

  // Заголовок дней недели
  html += `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px;">`;
  WEEKDAYS_SHORT.forEach(w => {
    html += `<div style="text-align: center; font-size: 9px; color: #6a5a8a; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;">${w}</div>`;
  });
  html += `</div>`;

  // Сетка дней
  html += `<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;">`;
  // Пустые клетки до начала месяца
  for (let i = 0; i < startWeekday; i++) {
    html += `<div></div>`;
  }
  const todayISO = today();
  for (let day = 1; day <= daysInMonth; day++) {
    const dateISO = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const data = activity[dateISO];
    const isToday = dateISO === todayISO;
    const isFuture = dateISO > todayISO;
    let bg, brd, txtColor;
    if (isFuture) {
      bg = 'rgba(255,255,255,0.015)'; brd = 'rgba(255,255,255,0.04)'; txtColor = '#3a2a5a';
    } else if (data) {
      const intensity = Math.min(1, data.count / maxCount);
      const alpha = 0.25 + intensity * 0.6;
      bg = color + Math.floor(alpha * 255).toString(16).padStart(2, '0');
      brd = color + '80';
      txtColor = '#fff';
    } else {
      bg = 'rgba(255,255,255,0.025)'; brd = 'rgba(255,255,255,0.06)'; txtColor = '#5a4a78';
    }
    const tooltip = data ? `${day} ${MONTHS_RU_SHORT[month-1]}: ${data.count} ${plural(data.count, 'задача', 'задачи', 'задач')}${data.hours ? `, ${data.hours.toFixed(1)} ч` : ''}` : `${day} ${MONTHS_RU_SHORT[month-1]}`;
    html += `<div title="${tooltip}" style="aspect-ratio: 1; background: ${bg}; border: 1px solid ${isToday ? color : brd}; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: ${txtColor}; font-weight: ${isToday ? '700' : '500'}; ${isToday ? `box-shadow: 0 0 8px ${color};` : ''} position: relative;">${day}${data ? `<div style="position: absolute; bottom: 2px; right: 2px; width: 4px; height: 4px; background: ${color}; border-radius: 50%; box-shadow: 0 0 4px ${color};"></div>` : ''}</div>`;
  }
  html += `</div>`;

  // Легенда
  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-top: 12px; font-size: 10px; color: #6a5a8a;">
    <span>меньше</span>
    <div style="display: flex; gap: 3px;">
      ${[0.15, 0.35, 0.55, 0.75, 0.95].map(a => `<div style="width: 12px; height: 12px; background: ${color}${Math.floor(a * 255).toString(16).padStart(2, '0')}; border-radius: 3px; border: 1px solid ${color}40;"></div>`).join('')}
    </div>
    <span>больше</span>
  </div>`;

  html += `</div>`;
  return html;
}

// Точечный 30-дневный график для отдельной задачи
function renderTaskMiniHeatmap(taskKey, color) {
  const activity = activityByDay(taskKey);
  const days = 30;
  const todayD = new Date(); todayD.setHours(0, 0, 0, 0);
  let html = `<div style="display: flex; gap: 2px; margin-top: 6px; align-items: flex-end;">`;
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(todayD); d.setDate(d.getDate() - i);
    const iso = dateToISO(d);
    const data = activity[iso];
    const isToday = i === 0;
    if (data) {
      const intensity = Math.min(1, (data.hours > 0 ? data.hours / 4 : data.count / 3));
      const alpha = 0.3 + intensity * 0.7;
      html += `<div title="${formatDateShort(iso)}: ${data.count} раз${data.hours ? `, ${data.hours.toFixed(1)} ч` : ''}" style="flex: 1; height: 14px; background: ${color}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}; border-radius: 2px; border: 1px solid ${color}60; ${isToday ? `box-shadow: 0 0 4px ${color};` : ''}"></div>`;
    } else {
      html += `<div title="${formatDateShort(iso)}: ничего" style="flex: 1; height: 14px; background: rgba(255,255,255,0.03); border-radius: 2px; border: 1px solid rgba(255,255,255,0.05); ${isToday ? `box-shadow: 0 0 0 1px ${color}40;` : ''}"></div>`;
    }
  }
  html += `</div><div style="display: flex; justify-content: space-between; font-size: 9px; color: #6a5a8a; margin-top: 3px;"><span>30 дней назад</span><span>сегодня</span></div>`;
  return html;
}

// === ВКЛАДКА «УЧЁТ» ===
function renderCounters() {
  const period = view.countersPeriod || 'all';
  const filter = view.countersFilter || 'all';

  const allRepeating = [];
  const seen = new Set();
  SPHERES.forEach(s => {
    state.tasks[s.id].forEach(t => {
      if (t.repeating) {
        allRepeating.push({ task: t, sphereId: s.id, deleted: false });
        seen.add(t.taskKey);
      }
    });
  });
  const historicalKeys = new Set();
  state.history.forEach(h => {
    if (h.taskKey && !seen.has(h.taskKey) && !historicalKeys.has(h.taskKey)) {
      historicalKeys.add(h.taskKey);
      allRepeating.push({ task: { taskKey: h.taskKey, title: h.title, type: h.hours > 0 ? 'hours' : 'simple' }, sphereId: h.sphere, deleted: true });
    }
  });

  let html = `<div style="text-align: center; margin-bottom: 20px;"><div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Учёт повторяющихся задач</div><p style="font-size: 13px; color: #8870a8; margin: 8px 0 0;">Сколько раз сделал каждую и сколько часов</p></div>`;

  // Период с реальными датами
  const periodLabel = (() => {
    if (period === 'all') return 'За всё время';
    if (period === 'today') return formatDateLong(today());
    if (period === 'week') {
      const w = new Date(); w.setDate(w.getDate() - 6);
      return `${formatDateShort(dateToISO(w))} — ${formatDateShort(today())}`;
    }
    if (period === 'month') {
      const d = new Date();
      return `${MONTHS_RU[d.getMonth()].charAt(0).toUpperCase() + MONTHS_RU[d.getMonth()].slice(1)} ${d.getFullYear()}`;
    }
    if (period === 'report') {
      const rp = currentReportPeriod();
      return `Отчёт · ${formatReportPeriod(rp)}${rp.isFirst ? ' (первый, короткий)' : ''}`;
    }
    if (period === 'prev_report') {
      const rp = prevReportPeriod();
      return rp ? `Прошлый отчёт · ${formatReportPeriod(rp)}` : 'Прошлого отчёта ещё нет';
    }
    if (period === 'custom') {
      if (view.customFrom && view.customTo) return `${formatDateShort(view.customFrom)} — ${formatDateShort(view.customTo)}`;
      if (view.customFrom) return `с ${formatDateShort(view.customFrom)}`;
      if (view.customTo) return `до ${formatDateShort(view.customTo)}`;
      return 'выбери даты ниже';
    }
    return '';
  })();

  html += `<div style="display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap;">${[['today', 'Сегодня'], ['week', 'Неделя'], ['report', '★ Отчёт'], ['month', 'Месяц'], ['all', 'Всё'], ['custom', 'Свой ↓']].map(([v, l]) => `<button onclick="window.__app.setPeriod('${v}')" style="flex: 1; min-width: 60px; padding: 8px 6px; background: ${period === v ? '#A78BFA' : 'transparent'}; color: ${period === v ? '#000' : '#b0a0d0'}; border: 1px solid ${period === v ? '#A78BFA' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600;">${l}</button>`).join('')}</div>`;

  html += `<div style="text-align: center; font-size: 11px; color: #A78BFA; margin-bottom: 12px; letter-spacing: 0.05em;">${periodLabel}</div>`;

  // Произвольный диапазон
  if (period === 'custom') {
    html += `<div style="display: flex; gap: 8px; margin-bottom: 14px; padding: 10px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px;"><div style="flex: 1;"><div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">С</div><input type="date" value="${view.customFrom || ''}" onchange="window.__app.setCustomFrom(this.value)" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div><div style="flex: 1;"><div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">По</div><input type="date" value="${view.customTo || ''}" onchange="window.__app.setCustomTo(this.value)" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div></div>`;
  }

  // Календарь общий
  html += `<button onclick="window.__app.toggleCalendar()" style="width: 100%; padding: 10px; margin-bottom: 14px; background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.3); border-radius: 10px; color: #A78BFA; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600;">${view.calendarVisible ? '▴ Скрыть календарь' : '▾ Показать календарь активности'}</button>`;
  if (view.calendarVisible) {
    html += renderHeatmapMonth(view.calendarMonth, null, '#A78BFA');
  }

  // Фильтр сфер
  html += `<div style="display: flex; gap: 6px; margin-bottom: 18px; overflow-x: auto; padding-bottom: 4px;"><button onclick="window.__app.setCFilter('all')" style="padding: 7px 12px; background: ${filter === 'all' ? '#fff' : 'transparent'}; color: ${filter === 'all' ? '#000' : '#b0a0d0'}; border: 1px solid ${filter === 'all' ? '#fff' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0;">Все</button>${SPHERES.map(sp => `<button onclick="window.__app.setCFilter('${sp.id}')" style="padding: 7px 12px; background: ${filter === sp.id ? sp.color : 'transparent'}; color: ${filter === sp.id ? '#000' : '#b0a0d0'}; border: 1px solid ${filter === sp.id ? sp.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">${sp.emoji} ${sp.name}</button>`).join('')}</div>`;

  const filtered = filter === 'all' ? allRepeating : allRepeating.filter(r => r.sphereId === filter);

  if (filtered.length === 0) {
    html += `<div style="text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;"><div style="font-size: 32px; margin-bottom: 12px; opacity: 0.4;">◷</div><div style="font-size: 14px; color: #b0a0d0; margin-bottom: 6px; font-weight: 600;">Пока нет повторяющихся задач</div><div style="font-size: 12px; color: #6a5a8a; line-height: 1.5;">Добавь задачу с галочкой «Повторяющаяся» в любой сфере.</div></div>`;
    return html;
  }

  const bySphere = {};
  filtered.forEach(r => {
    if (!bySphere[r.sphereId]) bySphere[r.sphereId] = [];
    bySphere[r.sphereId].push(r);
  });

  SPHERES.forEach(sp => {
    if (!bySphere[sp.id]) return;
    const items = bySphere[sp.id];
    let sphereTotalCount = 0, sphereTotalHours = 0;
    items.forEach(r => {
      const stats = taskStats(r.task.taskKey, period);
      sphereTotalCount += stats.count;
      sphereTotalHours += stats.hours;
    });

    const groupKey = `counters_${sp.id}`;
    // По умолчанию: если фильтр стоит на одной сфере — она открыта; иначе все свёрнуты
    const isFilteredToThis = filter === sp.id;
    const isOpen = view.expandedGroups && view.expandedGroups[groupKey] !== undefined
      ? view.expandedGroups[groupKey]
      : isFilteredToThis;

    html += `<div style="margin-bottom: 12px;">
      <button onclick="window.__app.toggleGroup('${groupKey}')" style="width: 100%; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: linear-gradient(135deg, ${sp.color}15, ${sp.color}05); border: 1px solid ${sp.color}40; border-left: 3px solid ${sp.color}; border-radius: 10px; cursor: pointer; text-align: left;">
        <div style="font-size: 14px; color: ${sp.color}; flex-shrink: 0; width: 16px;">${isOpen ? '▾' : '▸'}</div>
        <div style="font-size: 20px; filter: drop-shadow(0 0 6px ${sp.glow}); flex-shrink: 0;">${sp.emoji}</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 13px; color: #fff; font-weight: 700;">${sp.name}</div>
          <div style="font-size: 10px; color: ${sp.color}; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 1px;">${items.length} ${plural(items.length, 'задача', 'задачи', 'задач')}</div>
        </div>
        <div style="text-align: right; flex-shrink: 0;">
          <div style="font-size: 14px; color: #fff; font-weight: 700;">${sphereTotalCount} ${plural(sphereTotalCount, 'раз', 'раза', 'раз')}</div>
          ${sphereTotalHours > 0 ? `<div style="font-size: 11px; color: #00E5FF; font-weight: 600;">◷ ${sphereTotalHours.toFixed(1)} ч</div>` : ''}
        </div>
      </button>`;

    if (isOpen) {
      html += `<div style="margin-top: 6px; padding-left: 8px;">`;
      items.forEach(r => {
        const stats = taskStats(r.task.taskKey, period);
        const allTimeStats = taskStats(r.task.taskKey, 'all');
        const isHM = r.task.type === 'hours';
        html += `<div style="padding: 12px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${sp.color}; border-radius: 8px; margin-bottom: 6px; ${r.deleted ? 'opacity: 0.6;' : ''}">
          <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 6px;">
            <div style="font-size: 13px; color: #fff; word-break: break-word; flex: 1; font-weight: 500;">${escapeHtml(r.task.title)}${r.deleted ? ' <span style="font-size: 9px; color: #FF3D71; letter-spacing: 0.1em;">(УДАЛЕНА)</span>' : ''}</div>
          </div>
          <div style="display: flex; gap: 14px; flex-wrap: wrap; font-size: 12px; color: #b0a0d0; margin-bottom: 4px;">
            <span style="color: ${stats.count > 0 ? '#fff' : '#5a4a78'}; font-weight: 600;">✓ ${stats.count} ${plural(stats.count, 'раз', 'раза', 'раз')}</span>
            ${isHM && stats.hours > 0 ? `<span style="color: #00E5FF; font-weight: 600;">◷ ${stats.hours.toFixed(1)} ч</span>` : ''}
            ${stats.xp > 0 ? `<span style="color: #A78BFA;">+${stats.xp} XP</span>` : ''}
          </div>
          ${allTimeStats.lastDate ? `<div style="font-size: 10px; color: #6a5a8a;">Последний раз: <span style="color: #b0a0d0;">${formatDateRelative(allTimeStats.lastDate)}</span></div>` : ''}
          ${allTimeStats.count > 0 ? renderTaskMiniHeatmap(r.task.taskKey, sp.color) : ''}
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  return html;
}

function renderAchievements() {
  const total = ACHIEVEMENTS.length;
  const unlocked = Object.keys(state.achievementsUnlocked).length;
  let html = `<div style="text-align: center; margin-bottom: 24px;"><div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Дерево достижений</div><p style="font-size: 13px; color: #8870a8; margin: 8px 0 0;">${unlocked} / ${total} разблокировано</p></div>`;
  const branches = ['core', ...SPHERES.map(s => s.id)];
  const branchLabels = { core: { name: 'Ствол', color: '#A78BFA', glow: 'rgba(167,139,250,0.5)' } };
  SPHERES.forEach(s => branchLabels[s.id] = { name: s.name, color: s.color, glow: s.glow });
  branches.forEach(br => {
    const items = ACHIEVEMENTS.filter(a => a.branch === br);
    if (!items.length) return;
    const meta = branchLabels[br];
    const bU = items.filter(a => state.achievementsUnlocked[a.id]).length;
    html += `<div style="margin-bottom: 24px;"><div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06);"><div style="width: 8px; height: 8px; border-radius: 50%; background: ${meta.color}; box-shadow: 0 0 8px ${meta.glow};"></div><div style="font-size: 12px; letter-spacing: 0.2em; color: ${meta.color}; text-transform: uppercase; font-weight: 700; flex: 1;">${meta.name}</div><div style="font-size: 10px; color: #6a5a8a;">${bU}/${items.length}</div></div><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px;">`;
    items.forEach(a => {
      const isU = !!state.achievementsUnlocked[a.id];
      const c = a.color || meta.color;
      html += `<button onclick="window.__app.openAch('${a.id}')" style="background: ${isU ? `linear-gradient(135deg, ${c}25, ${c}08)` : 'rgba(255,255,255,0.02)'}; border: 1px solid ${isU ? `${c}60` : 'rgba(255,255,255,0.05)'}; border-radius: 10px; padding: 12px 10px; cursor: pointer; text-align: center; opacity: ${isU ? 1 : 0.5};"><div style="font-size: 22px; margin-bottom: 6px; filter: ${isU ? `drop-shadow(0 0 8px ${c})` : 'grayscale(1)'};">${isU ? a.icon : '🔒'}</div><div style="font-size: 11px; color: ${isU ? '#fff' : '#5a4a78'}; font-weight: 600; line-height: 1.2; margin-bottom: 2px;">${escapeHtml(a.name)}</div><div style="font-size: 9px; color: ${isU ? c : '#5a4a78'}; line-height: 1.3;">Tier ${a.tier}</div></button>`;
    });
    html += '</div></div>';
  });
  return html;
}

// === ВКЛАДКА «БАЗА ЗНАНИЙ» ===
// === ЖУРНАЛ МЫСЛЕЙ ===
function renderJournal() {
  const journal = state.journal || [];
  const search = (view.journalSearch || '').trim().toLowerCase();
  const filterSphere = view.journalSphereFilter; // null или id сферы

  let html = '';

  // Поиск
  if (journal.length > 0) {
    html += `<div style="margin-bottom: 12px;">
      <input id="journal-search-input" type="text" placeholder="Поиск по тексту..." value="${escapeHtml(view.journalSearch || '')}" oninput="window.__app.journalSearch(this.value)" style="width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-size: 12px; outline: none;" />
    </div>`;
  }

  // Фильтр по сфере (только если есть записи)
  if (journal.length > 0) {
    const total = journal.length;
    const noSphere = journal.filter(j => !j.sphereId).length;
    html += `<div style="display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; padding-bottom: 4px;">`;
    html += `<button onclick="window.__app.journalFilterSphere(null)" style="padding: 7px 12px; background: ${filterSphere === undefined || filterSphere === null ? '#fff' : 'transparent'}; color: ${filterSphere === undefined || filterSphere === null ? '#000' : '#b0a0d0'}; border: 1px solid ${filterSphere === undefined || filterSphere === null ? '#fff' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">Все · ${total}</button>`;
    SPHERES.forEach(sp => {
      const c = journal.filter(j => j.sphereId === sp.id).length;
      if (c === 0) return;
      const active = filterSphere === sp.id;
      html += `<button onclick="window.__app.journalFilterSphere('${sp.id}')" style="padding: 7px 12px; background: ${active ? sp.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? sp.color : sp.color + '60'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">${sp.emoji} ${sp.name} · ${c}</button>`;
    });
    if (noSphere > 0) {
      const active = filterSphere === 'none';
      html += `<button onclick="window.__app.journalFilterSphere('none')" style="padding: 7px 12px; background: ${active ? '#8870a8' : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">Без сферы · ${noSphere}</button>`;
    }
    html += `</div>`;
  }

  // Кнопка добавить
  html += `<button onclick="window.__app.journalStartAdd()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; margin-bottom: 14px;">+ Новая мысль</button>`;

  // Форма добавления / редактирования
  if (view.journalAdding || view.journalEditingId) {
    const editing = view.journalEditingId ? journal.find(j => j.id === view.journalEditingId) : null;
    const initTitle = editing ? editing.title : '';
    const initContent = editing ? editing.content : '';
    const initTags = editing ? (editing.tags || []).join(', ') : '';
    const initSphere = editing ? editing.sphereId : null;
    if (editing) window.__journalSphereId = initSphere;

    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid rgba(167,139,250,0.4); border-radius: 12px; padding: 14px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">${editing ? 'Редактирование' : 'Новая мысль'}</div>
      <input id="journal-title-input" placeholder="Заголовок" value="${escapeHtml(initTitle)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; outline: none; margin-bottom: 8px; font-weight: 600;" />
      <textarea id="journal-content-input" placeholder="Текст — мысль, наблюдение, статья..." rows="8" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; line-height: 1.6; outline: none; resize: vertical; margin-bottom: 8px; min-height: 120px;">${escapeHtml(initContent)}</textarea>
      <input id="journal-tags-input" placeholder="Теги через запятую (необязательно)" value="${escapeHtml(initTags)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;" />

      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Привязка к ветке (необязательно)</div>
      <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px;" id="journal-sphere-pick">
        <button data-spid="" onclick="window.__app.journalPickSphere('')" style="padding: 7px 11px; background: ${!window.__journalSphereId ? '#8870a8' : 'transparent'}; color: ${!window.__journalSphereId ? '#000' : '#b0a0d0'}; border: 1px solid ${!window.__journalSphereId ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">Без ветки</button>
        ${SPHERES.map(sp => {
          const active = window.__journalSphereId === sp.id;
          return `<button data-spid="${sp.id}" onclick="window.__app.journalPickSphere('${sp.id}')" style="padding: 7px 11px; background: ${active ? sp.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? sp.color : sp.color + '60'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">${sp.emoji} ${sp.name}</button>`;
        }).join('')}
      </div>

      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.journalConfirm()" style="flex: 1; padding: 11px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">${editing ? 'Сохранить' : 'Записать'}</button>
        <button onclick="window.__app.journalCancel()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('journal-title-input')?.focus(), 50);
  }

  // Список записей
  let items = [...journal];
  if (filterSphere === 'none') items = items.filter(j => !j.sphereId);
  else if (filterSphere) items = items.filter(j => j.sphereId === filterSphere);
  if (search) {
    items = items.filter(j =>
      (j.title || '').toLowerCase().includes(search) ||
      (j.content || '').toLowerCase().includes(search) ||
      (j.tags || []).some(t => t.toLowerCase().includes(search))
    );
  }
  items.sort((a, b) => b.timestamp - a.timestamp);

  if (items.length === 0) {
    if (journal.length === 0) {
      html += `<div style="text-align: center; padding: 40px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px;">
        <div style="font-size: 32px; margin-bottom: 12px; opacity: 0.4;">✎</div>
        <div style="font-size: 14px; color: #b0a0d0; margin-bottom: 6px; font-weight: 600;">Журнал пустой</div>
        <div style="font-size: 12px; color: #6a5a8a; line-height: 1.5;">Записывай мысли, статьи, наблюдения. Через год оглянешься — увидишь как менялся.</div>
      </div>`;
    } else {
      html += `<div style="text-align: center; padding: 30px 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 12px; font-size: 12px; color: #6a5a8a;">${search ? 'Ничего не найдено' : 'В этой ветке пока нет записей'}</div>`;
    }
  } else {
    items.forEach(j => {
      const sp = j.sphereId ? SPHERES.find(s => s.id === j.sphereId) : null;
      const accent = sp ? sp.color : '#A78BFA';
      const tagsHtml = (j.tags || []).slice(0, 4).map(t => `<span style="font-size: 9px; padding: 2px 7px; background: ${accent}25; color: ${accent}; border-radius: 5px; font-weight: 600;">#${escapeHtml(t)}</span>`).join(' ');
      const preview = (j.content || '').slice(0, 200);

      html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${accent}; border-radius: 10px; padding: 12px; margin-bottom: 8px;">
        <div style="display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 6px;">
          <div style="flex: 1; min-width: 0;">
            ${sp ? `<div style="font-size: 9px; color: ${accent}; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 3px;">${sp.emoji} ${escapeHtml(sp.name)}</div>` : ''}
            <div style="font-size: 14px; color: #fff; font-weight: 700; line-height: 1.3; word-break: break-word;">${escapeHtml(j.title || '(без заголовка)')}</div>
          </div>
          <div style="font-size: 9px; color: #6a5a8a; flex-shrink: 0;">${formatDateRelative(j.date)}</div>
        </div>
        ${preview ? `<div style="font-size: 12px; color: #b0a0d0; line-height: 1.5; margin-bottom: 6px; white-space: pre-wrap; word-break: break-word;">${escapeHtml(preview)}${j.content.length > 200 ? '…' : ''}</div>` : ''}
        ${tagsHtml ? `<div style="display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px;">${tagsHtml}</div>` : ''}
        <div style="display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04);">
          ${j.content && j.content.length > 200 ? `<button onclick="window.__app.journalView('${j.id}')" style="flex: 1; padding: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #b0a0d0; font-size: 10px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">📖 Читать</button>` : ''}
          <button onclick="window.__app.journalStartEdit('${j.id}')" style="flex: 1; padding: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; color: #b0a0d0; font-size: 10px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase;">✎ Изменить</button>
          <button onclick="window.__app.journalDelete('${j.id}')" style="padding: 6px 12px; background: transparent; border: 1px solid rgba(255,61,113,0.3); border-radius: 6px; color: #FF3D71; font-size: 10px; cursor: pointer;">🗑</button>
        </div>
      </div>`;
    });
  }

  return html;
}

function renderKB() {
  // Переключатель: Видео или Мысли
  const mode = view.kbMode || 'videos';

  let html = `<div style="text-align: center; margin-bottom: 16px;">
    <div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">База знаний</div>
  </div>`;

  // Табы Видео / Мысли
  html += `<div style="display: flex; gap: 6px; margin-bottom: 16px; padding: 4px; background: rgba(255,255,255,0.03); border-radius: 10px;">
    <button onclick="window.__app.kbSetMode('videos')" style="flex: 1; padding: 9px; background: ${mode === 'videos' ? 'linear-gradient(135deg, #A78BFA, #FF4DD8)' : 'transparent'}; color: ${mode === 'videos' ? '#fff' : '#8870a8'}; border: none; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">▶ Видео</button>
    <button onclick="window.__app.kbSetMode('thoughts')" style="flex: 1; padding: 9px; background: ${mode === 'thoughts' ? 'linear-gradient(135deg, #A78BFA, #FF4DD8)' : 'transparent'}; color: ${mode === 'thoughts' ? '#fff' : '#8870a8'}; border: none; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">✎ Мысли</button>
  </div>`;

  if (mode === 'thoughts') {
    return html + renderJournal();
  }

  // Видео — старая логика
  const kb = state.knowledgeBase || { categories: [], items: [] };
  const search = (view.kbSearch || '').trim().toLowerCase();

    // Чипы категорий
    kb.categories.forEach(cat => {
      const count = kb.items.filter(i => i.categoryId === cat.id).length;
      const active = activeFilter === cat.id;
      html += `<button onclick="window.__app.kbFilter('${cat.id}')" style="padding: 7px 12px; background: ${active ? cat.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? cat.color : cat.color + '60'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; flex-shrink: 0; white-space: nowrap;">${escapeHtml(cat.name)} · ${count}</button>`;
    });
    // «Без категории» (только если такие есть)
    if (uncatCount > 0) {

    }

  // Кнопки действий
  html += `<div style="display: flex; gap: 8px; margin-bottom: 14px;">
    <button onclick="window.__app.kbStartAddItem()" style="flex: 1; padding: 11px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 10px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 14px rgba(167,139,250,0.3);">+ Видео</button>
    <button onclick="window.__app.kbToggleCatManager()" style="padding: 11px 14px; background: rgba(255,255,255,0.04); color: #b0a0d0; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 600;">${view.kbManagingCats ? '▴ Категории' : '▾ Категории'}</button>
  </div>`;

  if (view.kbManagingCats) {
    html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; font-weight: 600;">Управление категориями</div>`;
    if (kb.categories.length === 0) {
      html += `<div style="font-size: 11px; color: #6a5a8a; line-height: 1.5; margin-bottom: 10px;">Категории помогают группировать видео — например «Тренировки», «Испанский», «Бизнес». Можно использовать или нет — твой выбор.</div>`;

          <div style="flex: 1; font-size: 12px; color: #fff;">${escapeHtml(cat.name)}</div>
          <div style="font-size: 10px; color: #8870a8;">${count}</div>
          <button onclick="window.__app.kbDeleteCat('${cat.id}')" title="Удалить" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 2px; font-size: 12px;">🗑</button>
        </div>`;
      });
    }
    if (view.kbAddingCat) {
      html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid #A78BFA40; border-radius: 8px; padding: 10px; margin-top: 8px;">
        <input id="kb-cat-name-input" placeholder="Название категории" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
        <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;">Цвет</div>
        <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;" id="kb-color-row">
          ${palette.map((c, idx) => `<button data-color="${c}" onclick="window.__app.kbPickColor('${c}')" style="width: 28px; height: 28px; border-radius: 50%; background: ${c}; border: ${idx === 0 ? '3px' : '1px'} solid ${idx === 0 ? '#fff' : 'rgba(255,255,255,0.1)'}; cursor: pointer; padding: 0;"></button>`).join('')}
        </div>
        <div style="display: flex; gap: 6px;">
          <button onclick="window.__app.kbConfirmAddCat()" style="flex: 1; padding: 9px; background: #A78BFA; color: #000; border: none; border-radius: 6px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Создать</button>
          <button onclick="window.__app.kbCancelAddCat()" style="padding: 9px 12px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 10px; cursor: pointer;">Отмена</button>
        </div>
      </div>`;
      setTimeout(() => document.getElementById('kb-cat-name-input')?.focus(), 50);
    } else {

      <input id="kb-tags-input" placeholder="Теги через запятую (необязательно)" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
      <textarea id="kb-note-input" placeholder="Заметка (необязательно)" rows="2" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; resize: vertical; margin-bottom: 10px;"></textarea>

      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Категория (необязательно)</div>
      <div style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;" id="kb-cat-pick-row">
        <button data-catid="" onclick="window.__app.kbPickCatForItem('')" style="padding: 7px 11px; background: ${!window.__kbItemCatId ? '#8870a8' : 'transparent'}; color: ${!window.__kbItemCatId ? '#000' : '#b0a0d0'}; border: 1px solid ${!window.__kbItemCatId ? '#8870a8' : 'rgba(255,255,255,0.1)'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">Без категории</button>
        ${kb.categories.map(c => {
          const active = window.__kbItemCatId === c.id;
          return `<button data-catid="${c.id}" onclick="window.__app.kbPickCatForItem('${c.id}')" style="padding: 7px 11px; background: ${active ? c.color : 'transparent'}; color: ${active ? '#000' : '#b0a0d0'}; border: 1px solid ${active ? c.color : c.color + '60'}; border-radius: 7px; font-size: 11px; cursor: pointer; font-weight: 600;">${escapeHtml(c.name)}</button>`;

        <div id="kb-preview-thumb" style="width: 80px; height: 50px; border-radius: 8px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #5a4a78; font-size: 18px;">🖼</div>
        <label style="flex: 1; padding: 10px; background: rgba(167,139,250,0.1); border: 1px dashed #A78BFA; border-radius: 8px; color: #A78BFA; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700; text-align: center;">

          <input type="file" accept="image/*" onchange="window.__app.kbPickPreview(this)" style="display:none;" />

      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.kbConfirmAdd()" style="flex: 1; padding: 11px; background: linear-gradient(135deg, #A78BFA, #FF4DD8); color: #fff; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Добавить</button>
        <button onclick="window.__app.kbCancelAdd()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('kb-title-input')?.focus(), 50);
  }

  // Список видео — общий, с применением фильтра и поиска
  let items = [...kb.items];
  if (activeFilter === 'uncategorized') {
    items = items.filter(i => !i.categoryId);
  } else if (activeFilter !== null) {
    items = items.filter(i => i.categoryId === activeFilter);
  }
  if (search) {
    items = items.filter(i =>
      i.title.toLowerCase().includes(search) ||
      (i.note || '').toLowerCase().includes(search) ||
      (i.tags || []).some(t => t.toLowerCase().includes(search))

  if (items.length === 0) {

  } else {
