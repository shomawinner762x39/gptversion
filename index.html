      const isEditing = view.kbEditingItem === item.id;
      if (isEditing) {
        html += `<div style="background: rgba(0,0,0,0.4); border: 1px solid ${accent}; border-radius: 12px; padding: 14px; margin-bottom: 8px;">
          <div style="font-size: 10px; color: ${accent}; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Редактирование</div>
          <input id="kb-edit-title-${item.id}" value="${escapeHtml(item.title)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px;" />
          <input id="kb-edit-url-${item.id}" value="${escapeHtml(item.url)}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
          <input id="kb-edit-tags-${item.id}" value="${escapeHtml((item.tags || []).join(', '))}" placeholder="Теги через запятую" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 8px;" />
          <textarea id="kb-edit-note-${item.id}" rows="2" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; resize: vertical; margin-bottom: 10px;">${escapeHtml(item.note || '')}</textarea>
          <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; font-weight: 600;">Категория</div>
          <select id="kb-edit-cat-${item.id}" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;">
            <option value="" ${!item.categoryId ? 'selected' : ''}>Без категории</option>
            ${kb.categories.map(c => `<option value="${c.id}" ${item.categoryId === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
          </select>
          <div style="display: flex; gap: 8px;">
            <button onclick="window.__app.kbConfirmEdit('${item.id}')" style="flex: 1; padding: 10px; background: ${accent}; color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Сохранить</button>
            <button onclick="window.__app.kbCancelEdit()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
          </div>
        </div>`;
      } else {
        const tagsHtml = (item.tags || []).slice(0, 4).map(t => `<span style="font-size: 9px; padding: 2px 7px; background: ${accent}25; color: ${accent}; border-radius: 5px; font-weight: 600;">#${escapeHtml(t)}</span>`).join(' ');
        const previewBlock = item.preview
          ? `<img src="${item.preview}" alt="" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" />`
          : `<div style="width: 100%; height: 100%; background: linear-gradient(135deg, ${accent}30, ${accent}10); display: flex; align-items: center; justify-content: center; font-size: 28px; color: ${accent}; border-radius: 8px;">▶</div>`;
        const catBadge = cat ? `<span style="font-size: 9px; padding: 2px 7px; background: ${cat.color}25; color: ${cat.color}; border: 1px solid ${cat.color}50; border-radius: 5px; font-weight: 700; letter-spacing: 0.05em;">${escapeHtml(cat.name)}</span>` : '';

        html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${accent}; border-radius: 10px; padding: 10px; margin-bottom: 8px;">
          <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer" style="display: flex; gap: 12px; text-decoration: none; color: inherit;">
            <div style="width: 110px; height: 70px; flex-shrink: 0; position: relative; overflow: hidden; border-radius: 8px;">
              ${previewBlock}
              <div style="position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.7); color: #fff; font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: 700;">▶ TG</div>

          <div style="display: flex; gap: 6px; margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.04);">

        </div>`;

    });
  }

  return html;
}

function renderHistory() {
  let html = '<div style="text-align: center; margin-bottom: 16px;"><div style="font-size: 10px; letter-spacing: 0.3em; color: #A78BFA; text-transform: uppercase; font-weight: 700;">Хроника</div><p style="font-size: 13px; color: #8870a8; margin: 8px 0 0;">' + (state.history.length === 0 ? 'Пока пусто' : 'Случайно нажал — ✕ отменит') + '</p></div>';

  // Прыжок к дате
  if (state.history.length > 0) {
    html += `<div style="display: flex; gap: 8px; align-items: center; margin-bottom: 16px; padding: 10px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 10px;"><div style="font-size: 11px; color: #A78BFA; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; flex-shrink: 0;">К дате:</div><input type="date" value="${view.historyJumpDate || ''}" onchange="window.__app.jumpToDate(this.value)" style="flex: 1; padding: 6px 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" />${view.historyJumpDate ? `<button onclick="window.__app.jumpToDate('')" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; padding: 6px 10px; border-radius: 6px; font-size: 11px;">сброс</button>` : ''}</div>`;
  }

  let filteredHistory = [...state.history].reverse();
  if (view.historyJumpDate) {
    filteredHistory = filteredHistory.filter(h => h.date === view.historyJumpDate);
    if (filteredHistory.length === 0) {
      html += `<div style="text-align: center; padding: 30px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 10px;"><div style="font-size: 13px; color: #b0a0d0;">${formatDateLong(view.historyJumpDate)}</div><div style="font-size: 11px; color: #6a5a8a; margin-top: 6px;">В этот день ничего не выполнено</div></div>`;
    }
  }

  const grouped = {};
  filteredHistory.forEach(h => { if (!grouped[h.date]) grouped[h.date] = []; grouped[h.date].push(h); });

  Object.keys(grouped).forEach(date => {
    const items = grouped[date];
    const totalDayXP = items.reduce((s, h) => s + h.xp, 0);
    const totalDayHours = items.reduce((s, h) => s + (h.hours || 0), 0);
    const dayGroupKey = 'history_day_' + date;
    const isDayOpen = view.expandedGroups && view.expandedGroups[dayGroupKey];

    // Заголовок дня — кнопка
    html += `<div style="margin-bottom: 8px;">
      <button onclick="window.__app.toggleGroup('${dayGroupKey}')" style="width: 100%; display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; cursor: pointer; text-align: left;">
        <div style="font-size: 14px; color: #A78BFA; flex-shrink: 0;">${isDayOpen ? '▾' : '▸'}</div>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: 13px; color: #fff; font-weight: 600;">${formatDateLong(date)}</div>
          <div style="font-size: 10px; color: #8870a8; margin-top: 2px;">${formatDateRelative(date)} · ${WEEKDAYS_SHORT[weekdayMon(parseISO(date))]} · ${items.length} ${plural(items.length, 'действие', 'действия', 'действий')}</div>
        </div>
        <div style="text-align: right; flex-shrink: 0;">
          <div style="font-size: 13px; color: #A78BFA; font-weight: 700;">+${totalDayXP} XP</div>
          ${totalDayHours > 0 ? `<div style="font-size: 10px; color: #00E5FF;">${totalDayHours.toFixed(1)} ч</div>` : ''}
        </div>
      </button>`;

    if (isDayOpen) {
      html += `<div style="margin-top: 4px; padding-left: 6px;">`;
      items.forEach(h => {
        const sphere = SPHERES.find(s => s.id === h.sphere);
        const isC = view.confirmUndoId === h.id;
        const hL = h.hours ? ` · ${h.hours}ч` : '';
        html += `<div style="padding: 11px 13px; background: ${isC ? 'rgba(255,61,113,0.1)' : 'rgba(255,255,255,0.03)'}; border-left: 3px solid ${isC ? '#FF3D71' : sphere.color}; border-radius: 8px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; gap: 10px;"><div style="flex: 1; min-width: 0;"><div style="font-size: 13px; color: #fff; word-break: break-word;">${escapeHtml(h.title)}</div><div style="font-size: 9px; color: ${sphere.color}; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 3px; font-weight: 600;">${sphere.name}${hL}</div></div><div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;"><div style="font-size: 13px; color: ${isC ? '#FF3D71' : '#A78BFA'}; font-weight: 700; ${isC ? 'text-decoration: line-through;' : ''}">${isC ? '−' : '+'}${h.xp}</div><button onclick="window.__app.undo('${h.id}')" style="width: 24px; height: 24px; background: ${isC ? '#FF3D71' : 'transparent'}; border: 1px solid ${isC ? '#FF3D71' : 'rgba(255,255,255,0.15)'}; border-radius: 50%; color: ${isC ? '#fff' : '#8870a8'}; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 11px;">${isC ? '✓' : '✕'}</button></div></div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  const lastBackupText = state.lastBackup ? `Последний бэкап: ${formatDateRelative(state.lastBackup)}` : 'Бэкапов ещё не было';
  html += `<div style="margin-top: 28px; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px;"><div style="font-size: 10px; letter-spacing: 0.25em; color: #A78BFA; text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Резервная копия</div><p style="font-size: 11px; color: #8870a8; line-height: 1.5; margin-bottom: 12px;">${lastBackupText}.</p><div style="display: flex; gap: 8px; margin-bottom: 8px;"><button onclick="window.__app.backupAndMark()" style="flex: 1; padding: 10px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.4); border-radius: 8px; color: #A78BFA; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600;">↓ Скачать</button><label style="flex: 1; padding: 10px; background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.4); border-radius: 8px; color: #A78BFA; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600; text-align: center;">↑ Загрузить<input type="file" accept=".json" onchange="window.__app.imp(this.files[0])" style="display:none;" /></label></div><button onclick="window.__app.exportICal()" style="width: 100%; padding: 10px; background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.3); border-radius: 8px; color: #00E5FF; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 600; margin-bottom: 12px;">📅 В календарь iPhone</button>${state.history.length > 0 ? `<button onclick="window.__app.reset()" style="width: 100%; padding: 10px; background: transparent; border: 1px solid rgba(255,61,113,0.3); border-radius: 8px; color: #FF3D71; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 600;">Стереть прогресс</button>` : ''}</div>`;
  return html;
}

// === ПАНЕЛЬ НАВЫКОВ (только для сферы skills) ===
function renderSkillsPanel(sphere) {
  const s = sphere;
  const skills = (state.skills || []).filter(sk => (sk.sphereId || 'skills') === s.id);

  let html = `<div style="background: linear-gradient(135deg, ${s.color}10, ${s.color}03); border: 1px solid ${s.color}30; border-radius: 14px; padding: 16px; margin-bottom: 18px;">`;

  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;">
    <div style="font-size: 11px; letter-spacing: 0.25em; color: ${s.color}; text-transform: uppercase; font-weight: 700;">Мои навыки</div>
    <div style="font-size: 10px; color: #8870a8;">${skills.length} ${plural(skills.length, 'навык', 'навыка', 'навыков')}</div>
  </div>`;

  if (skills.length === 0) {
    html += `<div style="text-align: center; padding: 20px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 10px; font-size: 12px; color: #6a5a8a; margin-bottom: 12px;">Пока нет навыков. Добавь первый.</div>`;
  } else {
    html += `<div style="display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px;">`;
    skills.forEach(sk => {
      const stats = skillStats(sk.id, null, 'all');
      const monthStats = skillStats(sk.id, null, 'month');
      const skType = SKILL_TYPES[sk.type] || SKILL_TYPES.custom;
      // Топ-3 субкатегории по часам
      const subStats = (sk.subs || []).map(sub => ({
        sub,
        h: skillStats(sk.id, sub.id, 'all').hours
      })).filter(x => x.h > 0).sort((a, b) => b.h - a.h);
      const topSubs = subStats.slice(0, 3);
      // Цветная полоска распределения
      let barHtml = '';
      if (subStats.length > 0 && stats.hours > 0) {
        barHtml = `<div style="display: flex; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 8px; background: rgba(255,255,255,0.04);">${subStats.map(x => `<div title="${x.sub.name}: ${x.h.toFixed(1)} ч" style="width: ${(x.h / stats.hours * 100)}%; background: ${x.sub.color};"></div>`).join('')}</div>`;
      }
      html += `<button onclick="window.__app.openSkill('${sk.id}')" style="background: linear-gradient(135deg, ${sk.color}20, ${sk.color}05); border: 1px solid ${sk.color}40; border-radius: 12px; padding: 12px 14px; cursor: pointer; text-align: left; position: relative;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 6px;">
          <div style="font-size: 24px; flex-shrink: 0;">${sk.icon || skType.icon}</div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 14px; color: #fff; font-weight: 700;">${escapeHtml(sk.name)}</div>
            <div style="font-size: 10px; color: ${sk.color}; letter-spacing: 0.1em;">${skType.name}${sk.target ? ` · цель ${escapeHtml(sk.target)}` : ''}</div>
          </div>
          <div style="text-align: right; flex-shrink: 0;">
            <div style="font-size: 16px; color: ${sk.color}; font-weight: 800;">${stats.hours.toFixed(1)}<span style="font-size: 11px;">ч</span></div>
            <div style="font-size: 9px; color: #6a5a8a;">${stats.count} ${plural(stats.count, 'занятие', 'занятия', 'занятий')}</div>
          </div>
        </div>
        ${barHtml}
        ${topSubs.length > 0 ? `<div style="display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;">${topSubs.map(x => `<span style="font-size: 9px; padding: 2px 7px; background: ${x.sub.color}25; color: ${x.sub.color}; border: 1px solid ${x.sub.color}50; border-radius: 6px; font-weight: 600;">${x.sub.name} ${x.h.toFixed(1)}ч</span>`).join('')}</div>` : ''}
        ${monthStats.hours > 0 ? `<div style="font-size: 9px; color: #8870a8; margin-top: 6px;">в этом месяце: ${monthStats.hours.toFixed(1)} ч · ${monthStats.count} занятий</div>` : ''}
      </button>`;
    });
    html += `</div>`;
  }

  if (view.skillAdding) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 12px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новый навык</div>
      <input id="skill-name-input" placeholder="Название (например: Английский)" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 8px;" />
      <input id="skill-target-input" placeholder="Цель (B2, C1, junior, и т.д.) — необязательно" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; outline: none; margin-bottom: 10px;" />
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">Тип</div>
      <div style="display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;" id="skill-type-row">
        ${Object.entries(SKILL_TYPES).map(([k, v]) => { const isActive = (window.__newSkillType || 'language') === k; return `<button data-stype="${k}" onclick="window.__app.setNewSkillType('${k}')" style="flex: 1; min-width: 80px; padding: 10px 6px; background: ${isActive ? s.color : 'transparent'}; color: ${isActive ? '#000' : '#b0a0d0'}; border: 1px solid ${isActive ? s.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; line-height: 1.3;"><div style="font-size: 16px; margin-bottom: 2px;">${v.icon}</div>${v.name}</button>`; }).join('')}
      </div>
      <div style="font-size: 10px; color: #6a5a8a; margin-bottom: 10px; line-height: 1.4;">«Язык» — 6 субкатегорий (listening, speaking и т.д.). «Тех. навык» — 3 (теория, практика, проекты). «Флит-менеджмент» — 4 KPI (утилизация, аренда, штрафы, увольнения с долгом). «Свой» — пустой.</div>
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmAddSkill()" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Создать</button>
        <button onclick="window.__app.cancelAddSkill()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('skill-name-input')?.focus(), 50);
  } else {
    html += `<button onclick="window.__app.startAddSkill()" style="width: 100%; padding: 11px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 10px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 700;">+ Добавить навык</button>`;
  }

  html += `</div>`;
  return html;
}

// Модал отдельного навыка
function renderSkillModal() {
  const sk = (state.skills || []).find(x => x.id === view.skillId);
  if (!sk) return '';
  const skType = SKILL_TYPES[sk.type] || SKILL_TYPES.custom;
  const period = view.skillPeriod || 'all';
  const stats = skillStats(sk.id, null, period);
  const allTimeStats = skillStats(sk.id, null, 'all');

  // Период с реальными датами
  const periodLabel = (() => {
    if (period === 'all') return 'За всё время';
    if (period === 'today') return formatDateLong(today());
    if (period === 'week') {
      const w = new Date(); w.setDate(w.getDate() - 6);
      return `${formatDateShort(dateToISO(w))} — ${formatDateShort(today())}`;
    }
    if (period === 'month') {
      const d = new Date();
      return `${MONTHS_RU[d.getMonth()].charAt(0).toUpperCase() + MONTHS_RU[d.getMonth()].slice(1)} ${d.getFullYear()}`;
    }
    return '';
  })();

  let body = '';

  // Большие цифры суммарно
  body += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px;">
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Часов</div>
      <div style="font-size: 18px; color: ${sk.color}; font-weight: 800;">${stats.hours.toFixed(1)}</div>
    </div>
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Занятий</div>
      <div style="font-size: 18px; color: #fff; font-weight: 800;">${stats.count}</div>
    </div>
    <div style="background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 8px; text-align: center;">
      <div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">XP</div>
      <div style="font-size: 18px; color: #A78BFA; font-weight: 800;">${stats.xp}</div>
    </div>
  </div>`;

  // Период
  body += `<div style="display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap;">${[['today', 'Сегодня'], ['week', 'Неделя'], ['month', 'Месяц'], ['all', 'Всё']].map(([v, l]) => `<button onclick="window.__app.setSkillPeriod('${v}')" style="flex: 1; min-width: 60px; padding: 7px 6px; background: ${period === v ? sk.color : 'transparent'}; color: ${period === v ? '#000' : '#b0a0d0'}; border: 1px solid ${period === v ? sk.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600;">${l}</button>`).join('')}</div>`;
  body += `<div style="text-align: center; font-size: 11px; color: ${sk.color}; margin-bottom: 16px; letter-spacing: 0.05em;">${periodLabel}</div>`;

  // Кнопка добавить занятие
  if (view.skillSessionAdding) {
    const subId = view.skillSessionSubId || (sk.subs[0]?.id);
    body += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${sk.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Записать занятие</div>
      <div style="font-size: 9px; color: #8870a8; margin-bottom: 6px; letter-spacing: 0.1em; text-transform: uppercase;">Категория</div>`;

    if ((sk.subs || []).length === 0) {
      body += `<div style="text-align: center; padding: 12px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 8px; font-size: 11px; color: #6a5a8a; margin-bottom: 10px;">Сначала добавь категорию ниже</div>`;
    } else {
      body += `<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px;" id="skill-sub-row">
        ${sk.subs.map((sub, idx) => {
          const isActive = subId ? sub.id === subId : idx === 0;
          return `<button data-subid="${sub.id}" onclick="window.__app.selectSkillSub('${sub.id}')" style="padding: 8px 6px; background: ${isActive ? sub.color + '30' : 'transparent'}; border: 1px solid ${isActive ? sub.color : 'rgba(255,255,255,0.08)'}; color: ${isActive ? '#fff' : '#b0a0d0'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; line-height: 1.3;">${sub.name}<br><span style="font-size: 9px; opacity: 0.7;">${sub.desc || ''}</span></button>`;
        }).join('')}
      </div>`;
    }

    body += `<div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <div style="flex: 2;">
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">${(() => { const activeSub = (sk.subs || []).find(x => x.id === subId); return activeSub && activeSub.invertGood ? 'Случаев (антиметрика)' : 'Часов'; })()}</div>
          <input id="skill-hours-input" type="number" min="${(() => { const activeSub = (sk.subs || []).find(x => x.id === subId); return activeSub && activeSub.invertGood ? '1' : '0.25'; })()}" step="${(() => { const activeSub = (sk.subs || []).find(x => x.id === subId); return activeSub && activeSub.invertGood ? '1' : '0.25'; })()}" value="1" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 16px; outline: none; text-align: center; font-weight: 700;" />
        </div>
        <div style="flex: 1;">
          <div style="font-size: 9px; color: #8870a8; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase;">Дата</div>
          <input id="skill-date-input" type="date" value="${today()}" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none;" />
        </div>
      </div>
      <input id="skill-note-input" placeholder="Заметка (необязательно)" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 12px;" />
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmSkillSession()" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${sk.color},${sk.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 16px ${sk.color}60;">Записать</button>
        <button onclick="window.__app.cancelSkillSession()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('skill-hours-input')?.focus(), 50);
  } else if ((sk.subs || []).length > 0) {
    body += `<button onclick="window.__app.startSkillSession()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, ${sk.color}30, ${sk.color}10); border: 1px solid ${sk.color}; border-radius: 10px; color: #fff; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; margin-bottom: 16px; font-weight: 700; box-shadow: 0 0 16px ${sk.color}40;">+ Записать занятие</button>`;
  }

  // Субкатегории с часами и графиками
  body += `<div style="font-size: 10px; color: ${sk.color}; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px;">Категории навыка</div>`;

  if ((sk.subs || []).length === 0) {
    body += `<div style="text-align: center; padding: 16px; background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.08); border-radius: 10px; font-size: 12px; color: #6a5a8a; margin-bottom: 10px;">Категорий пока нет. Добавь первую.</div>`;
  } else {
    // Считаем общее за период чтобы показать процент
    const totalHForBars = sk.subs.reduce((s, sub) => s + skillStats(sk.id, sub.id, period).hours, 0) || 1;
    sk.subs.forEach(sub => {
      const subStats = skillStats(sk.id, sub.id, period);
      const subAllTime = skillStats(sk.id, sub.id, 'all');
      const pct = (subStats.hours / totalHForBars) * 100;
      const isInvert = sub.invertGood;
      // Для антиметрики (invertGood: true) показываем количество, а не часы, и красное предупреждение если > 0
      const isAlertHigh = isInvert && subStats.count > 0;
      const bgCard = isInvert ? (isAlertHigh ? 'rgba(255,61,113,0.08)' : 'rgba(16,232,145,0.05)') : 'rgba(255,255,255,0.025)';
      const borderCard = isInvert ? (isAlertHigh ? 'rgba(255,61,113,0.3)' : 'rgba(16,232,145,0.2)') : 'rgba(255,255,255,0.05)';
      const bigValColor = isInvert ? (isAlertHigh ? '#FF3D71' : '#10E891') : sub.color;

      body += `<div style="background: ${bgCard}; border: 1px solid ${borderCard}; border-left: 3px solid ${sub.color}; border-radius: 10px; padding: 11px; margin-bottom: 6px;">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px;">
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 13px; color: #fff; font-weight: 700;">${isInvert ? '⚠ ' : ''}${escapeHtml(sub.name)}${isInvert ? ' <span style="font-size:9px; color:#FF3D71; letter-spacing:0.1em;">АНТИМЕТРИКА</span>' : ''}</div>
            ${sub.desc ? `<div style="font-size: 10px; color: #8870a8;">${escapeHtml(sub.desc)}</div>` : ''}
          </div>
          <div style="text-align: right; flex-shrink: 0;">
            ${isInvert
              ? `<div style="font-size: 18px; color: ${bigValColor}; font-weight: 800; line-height: 1;">${subStats.count}</div><div style="font-size: 9px; color: #8870a8; margin-top: 2px;">${isAlertHigh ? 'случаев' : 'отлично — 0'}</div>`
              : `<div style="font-size: 14px; color: ${sub.color}; font-weight: 700;">${subStats.hours.toFixed(1)} ч</div><div style="font-size: 9px; color: #8870a8;">${subStats.count} ${plural(subStats.count, 'занятие', 'занятия', 'занятий')}</div>`}
          </div>
          <button onclick="window.__app.removeSkillSub('${sk.id}', '${sub.id}')" title="Удалить категорию" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 4px; font-size: 12px; flex-shrink: 0;">🗑</button>
        </div>
        ${!isInvert && subStats.hours > 0 ? `<div style="height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;"><div style="height: 100%; width: ${pct}%; background: ${sub.color}; box-shadow: 0 0 6px ${sub.color}60;"></div></div><div style="font-size: 9px; color: #6a5a8a; margin-top: 3px; text-align: right;">${pct.toFixed(0)}% от выбранного периода${period !== 'all' && subAllTime.hours !== subStats.hours ? ` · всего ${subAllTime.hours.toFixed(1)} ч` : ''}</div>` : ''}
        ${subAllTime.lastDate ? `<div style="font-size: 9px; color: #6a5a8a; margin-top: 4px;">${isInvert ? 'последний случай: ' : 'посл. '}${formatDateRelative(subAllTime.lastDate)}</div>` : ''}
      </div>`;
    });
  }

  // Добавить субкатегорию
  if (view.skillSubAdding) {
    body += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${sk.color}40; border-radius: 10px; padding: 12px; margin: 10px 0;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новая категория</div>
      <input id="sub-name-input" placeholder="Название" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 6px;" />
      <input id="sub-desc-input" placeholder="Описание (необязательно)" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;" />
      <div style="display: flex; gap: 8px;">
        <button onclick="window.__app.confirmAddSub('${sk.id}')" style="flex: 1; padding: 10px; background: ${sk.color}; color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Добавить</button>
        <button onclick="window.__app.cancelAddSub()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
    setTimeout(() => document.getElementById('sub-name-input')?.focus(), 50);
  } else {
    body += `<button onclick="window.__app.startAddSub()" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.15); border-radius: 10px; color: #8870a8; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-top: 8px; font-weight: 600;">+ Категория</button>`;
  }

  // Последние занятия — с возможностью отменить
  const sessions = state.history
    .filter(h => h.skillId === sk.id)
    .sort((a, b) => b.timestamp - a.timestamp);

  if (sessions.length > 0) {
    body += `<div style="margin-top: 22px; margin-bottom: 8px;"><div style="font-size: 10px; color: ${sk.color}; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px;">Последние занятия (${sessions.length})</div>`;
    // Показываем последние 12, чтобы не было слишком длинно
    const visible = sessions.slice(0, 12);
    visible.forEach(h => {
      const sub = findSkillSub(sk, h.subId);
      const subColor = sub ? sub.color : sk.color;
      const subName = sub ? sub.name : 'без категории';
      const isC = view.confirmUndoId === h.id;
      body += `<div style="padding: 10px 12px; background: ${isC ? 'rgba(255,61,113,0.1)' : 'rgba(255,255,255,0.03)'}; border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid ${isC ? '#FF3D71' : subColor}; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; gap: 10px;">
        <div style="flex: 1; min-width: 0;">
          <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
            <span style="font-size: 11px; color: ${subColor}; font-weight: 700; letter-spacing: 0.05em;">${escapeHtml(subName)}</span>
            <span style="font-size: 11px; color: #fff; font-weight: 600;">${h.hours}ч</span>
          </div>
          <div style="font-size: 10px; color: #8870a8; margin-top: 3px;">${formatDateRelative(h.date)}${h.note ? ` · ${escapeHtml(h.note)}` : ''}</div>
        </div>
        <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
          <div style="font-size: 11px; color: ${isC ? '#FF3D71' : '#A78BFA'}; font-weight: 700; ${isC ? 'text-decoration: line-through;' : ''}">${isC ? '−' : '+'}${h.xp}</div>
          <button onclick="window.__app.undo('${h.id}')" style="width: 22px; height: 22px; background: ${isC ? '#FF3D71' : 'transparent'}; border: 1px solid ${isC ? '#FF3D71' : 'rgba(255,255,255,0.15)'}; border-radius: 50%; color: ${isC ? '#fff' : '#8870a8'}; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 10px; flex-shrink: 0;">${isC ? '✓' : '✕'}</button>
        </div>
      </div>`;
    });
    if (sessions.length > 12) {
      body += `<div style="text-align: center; font-size: 10px; color: #6a5a8a; margin-top: 6px;">показаны последние 12 из ${sessions.length}. Все остальные — во вкладке «Хроника».</div>`;
    }
    body += `</div>`;
  }

  // Удаление навыка
  body += `<div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06);">
    <button onclick="window.__app.removeSkill('${sk.id}')" style="width: 100%; padding: 9px; background: transparent; color: #FF3D71; border: 1px solid rgba(255,61,113,0.3); border-radius: 8px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 600;">Удалить навык</button>
  </div>`;

  return `<div onclick="window.__app.closeSkill()" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 250; display: flex; align-items: flex-end; justify-content: center;"><div onclick="event.stopPropagation()" style="background: linear-gradient(180deg, #150a25, #0a0612); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; padding: 20px; position: relative; border-top: 3px solid ${sk.color}; box-shadow: 0 -10px 40px ${sk.color}40;">
    <button onclick="window.__app.closeSkill()" style="position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #b0a0d0; cursor: pointer; padding: 0; width: 28px; height: 28px; border-radius: 50%; font-size: 16px;">✕</button>
    <div style="display: flex; align-items: center; gap: 14px; margin: 8px 0 18px;">
      <div style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, ${sk.color}40, ${sk.color}10); border: 1px solid ${sk.color}; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 0 20px ${sk.color}60;">${sk.icon || skType.icon}</div>
      <div style="flex: 1; min-width: 0;">
        <div style="font-size: 22px; color: #fff; font-weight: 700;">${escapeHtml(sk.name)}</div>
        <div style="font-size: 11px; color: ${sk.color}; letter-spacing: 0.1em;">${skType.name}${sk.target ? ` · цель ${escapeHtml(sk.target)}` : ''}</div>
        ${allTimeStats.lastDate ? `<div style="font-size: 10px; color: #8870a8; margin-top: 3px;">последнее занятие: ${formatDateRelative(allTimeStats.lastDate)}</div>` : ''}
      </div>
    </div>
    ${body}
  </div></div>`;
}

// === ПАНЕЛЬ ФИНАНСОВ (только для сферы money) ===
// === ПАНЕЛЬ ТЕЛА (только для сферы body) — замеры веса и обхватов ===
function renderBodyPanel(sphere) {
  const s = sphere;
  const bodyTab = view.bodyTab || 'workout'; // 'workout' | 'nutrition' | 'measures'

  let html = `<div style="background: linear-gradient(135deg, ${s.color}10, ${s.color}03); border: 1px solid ${s.color}30; border-radius: 14px; padding: 14px; margin-bottom: 18px;">`;

  // Три вкладки
  html += `<div style="display: flex; gap: 5px; margin-bottom: 14px; padding: 3px; background: rgba(0,0,0,0.2); border-radius: 9px;">
    ${[['workout','🏋️ Тренировки'],['nutrition','🥗 Питание'],['measures','📏 Замеры']].map(([id,label]) =>
      `<button onclick="window.__app.setBodyTab('${id}')" style="flex:1;padding:7px 4px;background:${bodyTab===id?s.color:'transparent'};color:${bodyTab===id?'#000':'#8870a8'};border:none;border-radius:6px;font-size:10px;cursor:pointer;font-weight:700;letter-spacing:0.05em;">${label}</button>`
    ).join('')}
  </div>`;

  if (bodyTab === 'workout') html += renderWorkoutTab(s);
  else if (bodyTab === 'nutrition') html += renderNutritionTab(s);
  else html += renderMeasuresTab(s);

  html += `</div>`;
  return html;
}

// === ВКЛАДКА ТРЕНИРОВОК ===
function renderWorkoutTab(s) {
  const DAY_ORDER = ['mon','tue','wed','thu','fri','sat'];
  const WEEK_LABELS = ['Нед 1–2\n(вход)', 'Нед 3–4\n(рост)', 'Нед 5–6\n(+объём)', 'Нед 7–8\n(пик)'];
  const weekIdx = view.workoutWeek !== undefined ? view.workoutWeek : 0;
  const selectedDay = view.workoutDay || null;
  const selectedEx = view.workoutEx !== undefined ? view.workoutEx : null;

  let html = '';

  // Переключатель недель
  html += `<div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Этап программы</div>`;
  html += `<div style="display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-bottom: 14px;">`;
  WORKOUT_PROGRAM.weeks.forEach((w,i) => {
    const active = weekIdx === i;
    html += `<button onclick="window.__app.setWorkoutWeek(${i})" style="padding:7px 4px;background:${active?s.color+'30':'transparent'};border:1px solid ${active?s.color:'rgba(255,255,255,0.08)'};border-radius:7px;color:${active?'#fff':'#8870a8'};font-size:9px;cursor:pointer;font-weight:${active?'700':'500'};line-height:1.3;text-align:center;">${w.label.replace('–','–')}<br><span style="font-size:8px;opacity:0.7;">${w.sub.split(' — ')[0]}</span></button>`;
  });
  html += `</div>`;

  html += `<div style="font-size: 9px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px;">Дни недели</div>`;

  // Сетка дней 3+3
  html += `<div style="display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 12px;">`;
  DAY_ORDER.forEach(dayId => {
    const d = WORKOUT_PROGRAM.days[dayId];
    const isSelected = selectedDay === dayId;
    const borderColor = isSelected ? d.color : d.color + '50';
    const bg = isSelected ? d.color + '25' : 'rgba(255,255,255,0.025)';
    html += `<button onclick="window.__app.setWorkoutDay('${dayId}')" style="padding:10px 6px;background:${bg};border:1px solid ${borderColor};border-radius:9px;cursor:pointer;text-align:center;">
      <div style="font-size:18px;margin-bottom:3px;">${d.emoji}</div>
      <div style="font-size:10px;color:#fff;font-weight:700;line-height:1.2;">${d.label.slice(0,2) === 'По' ? 'Пн' : d.label.slice(0,2) === 'Вт' ? 'Вт' : d.label.slice(0,2) === 'Ср' ? 'Ср' : d.label.slice(0,2) === 'Че' ? 'Чт' : d.label.slice(0,2) === 'Пя' ? 'Пт' : 'Сб'}</div>
      <div style="font-size:9px;color:${d.color};margin-top:2px;line-height:1.2;">${d.title.split(' + ')[0]}</div>
      <div style="font-size:8px;color:#6a5a8a;margin-top:2px;">${d.type === 'strength' ? '💪 сила' : '🔄 суставы'}</div>
    </button>`;
  });
  html += `</div>`;

  // Выбранный день — список упражнений
  if (selectedDay && WORKOUT_PROGRAM.days[selectedDay]) {
    const d = WORKOUT_PROGRAM.days[selectedDay];
    const prog = WORKOUT_PROGRAM.weeks[weekIdx];

    html += `<div style="background:rgba(0,0,0,0.25);border:1px solid ${d.color}40;border-radius:10px;padding:12px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <div style="font-size:22px;">${d.emoji}</div>
        <div>
          <div style="font-size:14px;color:#fff;font-weight:700;">${d.label} — ${d.title}</div>
          <div style="font-size:10px;color:${d.color};">${prog.label} · ${prog.sub}</div>
        </div>
      </div>
      <div style="font-size:11px;color:#FFAA00;padding:6px 8px;background:rgba(255,170,0,0.08);border-radius:6px;margin-bottom:8px;line-height:1.4;">⚠️ ${d.note}</div>
    </div>`;

    // Упражнения
    d.exercises.forEach((ex, ei) => {
      const isExOpen = selectedEx === ei;
      html += `<div style="margin-bottom:5px;">
        <button onclick="window.__app.toggleWorkoutEx(${ei})" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;background:${isExOpen?d.color+'20':'rgba(255,255,255,0.025)'};border:1px solid ${isExOpen?d.color:d.color+'40'};border-radius:8px;cursor:pointer;text-align:left;">
          <div style="font-size:12px;color:${d.color};flex-shrink:0;width:14px;">${isExOpen?'▾':'▸'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;color:#fff;font-weight:600;">${ei+1}. ${ex.name}</div>
            <div style="font-size:10px;color:${d.color};margin-top:1px;">${ex.sets} · ${ex.muscle}</div>
          </div>
        </button>`;

      if (isExOpen) {
        html += `<div style="margin-top:4px;padding:10px 12px;background:rgba(0,0,0,0.3);border:1px solid ${d.color}30;border-radius:8px;margin-left:8px;">
          <div style="font-size:12px;color:#e0d0ff;line-height:1.5;margin-bottom:8px;">💡 ${ex.note}</div>
          <a href="${ex.url}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:${d.color}25;border:1px solid ${d.color}50;border-radius:6px;color:${d.color};font-size:10px;font-weight:700;text-decoration:none;letter-spacing:0.1em;text-transform:uppercase;">▶ Смотреть технику на MuscleWiki</a>
        </div>`;
      }
      html += `</div>`;
    });
  }

  return html;
}

// === ВКЛАДКА ПИТАНИЯ ===
function renderNutritionTab(s) {
  let html = `<div style="font-size:10px;color:${s.color};letter-spacing:0.15em;text-transform:uppercase;font-weight:700;margin-bottom:8px;">План питания</div>`;

  html += `<div style="padding:10px 12px;background:rgba(16,232,145,0.08);border:1px solid rgba(16,232,145,0.25);border-radius:8px;margin-bottom:10px;">
    <div style="font-size:11px;color:#10E891;font-weight:700;margin-bottom:4px;">🎯 Цель</div>
    <div style="font-size:11px;color:#e0d0ff;line-height:1.4;">${NUTRITION_PLAN.goal}</div>
    <div style="font-size:10px;color:#8870a8;margin-top:4px;">${NUTRITION_PLAN.calories}</div>
  </div>`;

  // Макросы
  html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;">
    <div style="padding:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;text-align:center;">
      <div style="font-size:9px;color:#8870a8;text-transform:uppercase;letter-spacing:0.1em;">Белок</div>
      <div style="font-size:14px;color:#FF3D71;font-weight:700;">${NUTRITION_PLAN.macros.protein}</div>
    </div>
    <div style="padding:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;text-align:center;">
      <div style="font-size:9px;color:#8870a8;text-transform:uppercase;letter-spacing:0.1em;">Углеводы</div>
      <div style="font-size:14px;color:#FFAA00;font-weight:700;">${NUTRITION_PLAN.macros.carbs}</div>
    </div>
    <div style="padding:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:7px;text-align:center;">
      <div style="font-size:9px;color:#8870a8;text-transform:uppercase;letter-spacing:0.1em;">Жиры</div>
      <div style="font-size:14px;color:#A78BFA;font-weight:700;">${NUTRITION_PLAN.macros.fat}</div>
    </div>
  </div>`;

  // Приёмы пищи
  html += `<div style="font-size:10px;color:#8870a8;letter-spacing:0.15em;text-transform:uppercase;font-weight:700;margin-bottom:6px;">Расписание приёмов</div>`;
  NUTRITION_PLAN.meals.forEach((meal, mi) => {
    const isMealOpen = view.nutritionMeal === mi;
    html += `<div style="margin-bottom:5px;">
      <button onclick="window.__app.toggleNutritionMeal(${mi})" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;background:${isMealOpen?'rgba(16,232,145,0.12)':'rgba(255,255,255,0.025)'};border:1px solid ${isMealOpen?'rgba(16,232,145,0.4)':'rgba(255,255,255,0.07)'};border-radius:8px;cursor:pointer;text-align:left;">
        <div style="font-size:12px;color:#10E891;flex-shrink:0;width:14px;">${isMealOpen?'▾':'▸'}</div>
        <div style="font-size:18px;flex-shrink:0;">${meal.emoji}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:12px;color:#fff;font-weight:600;">${meal.time} — ${meal.name}</div>
          <div style="font-size:10px;color:#8870a8;margin-top:1px;">${meal.kcal}</div>
        </div>
      </button>`;
    if (isMealOpen) {
      html += `<div style="padding:10px 12px;background:rgba(0,0,0,0.25);border:1px solid rgba(16,232,145,0.2);border-radius:8px;margin-left:8px;margin-top:4px;">`;
      meal.items.forEach(item => {
        html += `<div style="font-size:12px;color:#e0d0ff;padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04);">• ${item}</div>`;
      });
      html += `<div style="font-size:11px;color:#8870a8;margin-top:6px;font-style:italic;">${meal.note}</div></div>`;
    }
    html += `</div>`;
  });

  // Советы
  html += `<div style="font-size:10px;color:#8870a8;letter-spacing:0.15em;text-transform:uppercase;font-weight:700;margin:12px 0 6px;">Правила</div>`;
  NUTRITION_PLAN.tips.forEach(tip => {
    html += `<div style="font-size:11px;color:#b0a0d0;padding:6px 10px;background:rgba(255,255,255,0.025);border-radius:6px;margin-bottom:4px;line-height:1.4;">${tip}</div>`;
  });

  return html;
}

// === ВКЛАДКА ЗАМЕРОВ (старый код вынесен сюда) ===
function renderMeasuresTab(s) {
  const body = state.body || { height: null, measurements: [] };
  const measurements = [...(body.measurements || [])].sort((a, b) => b.date.localeCompare(a.date) || b.timestamp - a.timestamp);
  let html = '';

  html += `<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
    <div style="font-size: 11px; letter-spacing: 0.25em; color: ${s.color}; text-transform: uppercase; font-weight: 700;">Замеры тела</div>
    <div style="font-size: 10px; color: #8870a8;">${measurements.length} ${plural(measurements.length, 'замер', 'замера', 'замеров')}</div>
  </div>`;

  if (!body.height || view.bodyEditingHeight) {
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${s.color}40; border-radius: 10px; padding: 11px; margin-bottom: 10px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">${body.height ? 'Изменить рост' : 'Сначала укажи рост'}</div>
      <div style="display: flex; gap: 8px;">
        <input id="body-height-input" type="number" min="100" max="250" value="${body.height || ''}" placeholder="см" style="flex: 1; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center; font-weight: 700;" />
        <button onclick="window.__app.bodySaveHeight()" style="padding: 9px 14px; background: ${s.color}; color: #000; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">ОК</button>
        ${body.height ? `<button onclick="window.__app.bodyCancelHeight()" style="padding: 9px 12px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 11px; cursor: pointer;">Отмена</button>` : ''}
      </div>
    </div>`;
  } else {
    html += `<div style="display: flex; align-items: center; justify-content: space-between; padding: 8px 11px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px;">
      <span style="font-size: 11px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Рост</span>
      <span style="font-size: 13px; color: #fff; font-weight: 700;">${body.height} см</span>
      <button onclick="window.__app.bodyEditHeight()" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 2px 6px; font-size: 11px;">✎</button>
    </div>`;
  }

  if (measurements.length > 0) {
    const last = measurements[0];
    const prev = measurements[1];
    const wDiff = last.weight && prev?.weight ? (last.weight - prev.weight).toFixed(1) : null;
    const wColor = wDiff === null ? '#8870a8' : (parseFloat(wDiff) > 0 ? '#FFAA00' : parseFloat(wDiff) < 0 ? '#10E891' : '#8870a8');
    const wSign = wDiff && parseFloat(wDiff) > 0 ? '+' : '';
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 10px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Последний замер · ${formatDateRelative(last.date)}</div>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;">
        ${last.weight ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Вес</div><div style="font-size: 16px; color: #fff; font-weight: 800;">${last.weight} кг</div>${wDiff !== null ? `<div style="font-size: 10px; color: ${wColor}; font-weight: 600;">${wSign}${wDiff} от пред.</div>` : ''}</div>` : ''}
        ${last.chest ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Грудь</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.chest} см</div></div>` : ''}
        ${last.waist ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Талия</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.waist} см</div></div>` : ''}
        ${last.hips ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Бёдра</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.hips} см</div></div>` : ''}
        ${last.biceps ? `<div style="background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px; text-align: center;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase;">Бицепс</div><div style="font-size: 14px; color: #fff; font-weight: 700;">${last.biceps} см</div></div>` : ''}
      </div>
    </div>`;
  }

  if (view.bodyAdding) {
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 10px;">
      <div style="font-size: 10px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; font-weight: 600;">Новый замер</div>
      <div style="display: flex; gap: 6px; margin-bottom: 8px;"><input id="body-date-input" type="date" value="${today()}" style="flex: 1; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none;" /></div>
      <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-bottom: 8px;">
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Вес (кг)</div><input id="body-weight-input" type="number" step="0.1" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center; font-weight: 700;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Грудь (см)</div><input id="body-chest-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Талия (см)</div><input id="body-waist-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Бёдра (см)</div><input id="body-hips-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
        <div style="grid-column: span 2;"><div style="font-size: 9px; color: #8870a8; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px;">Бицепс (см)</div><input id="body-biceps-input" type="number" step="0.5" placeholder="—" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 14px; outline: none; text-align: center;" /></div>
      </div>
      <input id="body-note-input" placeholder="Заметка" style="width: 100%; padding: 9px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-size: 12px; outline: none; margin-bottom: 10px;" />
      <div style="display: flex; gap: 6px;">
        <button onclick="window.__app.bodyConfirm()" style="flex: 1; padding: 10px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 6px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 700;">Записать</button>
        <button onclick="window.__app.bodyCancelAdd()" style="padding: 10px 14px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 11px; cursor: pointer;">Отмена</button>
      </div>
    </div>`;
  } else if (body.height) {
    html += `<button onclick="window.__app.bodyStartAdd()" style="width: 100%; padding: 10px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 8px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-bottom: 10px; font-weight: 700;">+ Замер</button>`;
  }

  const withWeight = measurements.filter(m => m.weight).reverse();
  if (withWeight.length >= 2) {
    const weights = withWeight.map(m => m.weight);
    const minW = Math.min(...weights), maxW = Math.max(...weights);
    const range = maxW - minW || 1;
    const w = 320, h = 80, pad = 4;
    const stepX = (w - pad * 2) / (withWeight.length - 1);
    let path = '', dots = '';
    withWeight.forEach((m, i) => {
      const x = pad + i * stepX;
      const y = pad + (h - pad * 2) * (1 - (m.weight - minW) / range);
      path += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
      dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.5" fill="${s.color}" />`;
    });
    html += `<div style="background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 11px; margin-bottom: 8px;">
      <div style="display: flex; justify-content: space-between; font-size: 10px; color: #8870a8; margin-bottom: 6px;"><span>Вес · график</span><span>${minW}–${maxW} кг</span></div>
      <svg viewBox="0 0 ${w} ${h}" style="width: 100%; height: ${h}px; display: block;">
        <path d="${path}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
        ${dots}
      </svg>
    </div>`;
  }

  if (measurements.length > 0) {
    html += `<div style="font-size: 10px; color: #8870a8; letter-spacing: 0.15em; text-transform: uppercase; margin: 10px 0 6px; font-weight: 600;">История</div>`;
    measurements.slice(0, 12).forEach(m => {
      const parts = [];
      if (m.weight) parts.push(`<span style="color:#fff;font-weight:700;">${m.weight} кг</span>`);
      if (m.chest) parts.push(`гр ${m.chest}`);
      if (m.waist) parts.push(`т ${m.waist}`);
      if (m.hips) parts.push(`бд ${m.hips}`);
      if (m.biceps) parts.push(`бц ${m.biceps}`);
      html += `<div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 8px 10px; background: rgba(255,255,255,0.025); border-radius: 6px; margin-bottom: 4px;">
        <div style="font-size: 10px; color: #8870a8; flex-shrink: 0; min-width: 70px;">${formatDateShort(m.date)}</div>
        <div style="font-size: 11px; color: #b0a0d0; flex: 1;">${parts.join(' · ')}${m.note ? ` <span style="color:#6a5a8a;">· ${escapeHtml(m.note)}</span>` : ''}</div>
        <button onclick="window.__app.bodyRemoveMeasurement('${m.id}')" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 2px; font-size: 12px; flex-shrink: 0;">🗑</button>
      </div>`;
    });
  }

  return html;
}


function renderFinancePanel(sphere) {

    const cats = FIN_CATEGORIES[t];
    html += `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;">

        <button onclick="window.__app.setFinAddType('expense')" style="flex: 1; padding: 10px; background: ${t === 'expense' ? '#FF3D71' : 'transparent'}; color: ${t === 'expense' ? '#000' : '#FF3D71'}; border: 1px solid ${t === 'expense' ? '#FF3D71' : 'rgba(255,61,113,0.3)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">↓ Расход</button>

          <input id="fin-amount" type="number" step="0.01" min="0" placeholder="0" oninput="updateFXDisplay()" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 16px; outline: none; text-align: center; font-weight: 700;" />

        const sb = grouped.expense[b].reduce((s, e) => s + e.amount, 0);

      sortedCats.forEach(catId => {
        const cat = findFinCategory('expense', catId);

        const catSum = items.reduce((s, e) => s + e.amount, 0);

            <div style="text-align: right; flex-shrink: 0;"><div style="font-size: 13px; color: #FF3D71; font-weight: 700;">${fmtMoney(catSum)}</div><div style="font-size: 9px; color: #8870a8;">${pct.toFixed(0)}%</div></div>

          ${items.map(e => `<div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-top: 1px dashed rgba(255,255,255,0.04); gap: 8px;">

    // Доходы

      html += `<div style="margin-bottom: 8px;"><div style="font-size: 10px; color: #10E891; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 8px;">Доходы по категориям</div>`;
      const sortedCats = Object.keys(grouped.income).sort((a, b) => {

        const catSum = items.reduce((s, e) => s + e.amount, 0);
        html += `<div style="background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; padding: 10px; margin-bottom: 6px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;">
            <div style="display: flex; align-items: center; gap: 8px; min-width: 0; flex: 1;"><span style="color: ${cat.color}; font-size: 14px;">${cat.icon}</span><span style="font-size: 12px; color: #fff; font-weight: 600;">${escapeHtml(cat.name)}</span><span style="font-size: 10px; color: #6a5a8a;">${items.length}</span></div>
            <div style="font-size: 13px; color: #10E891; font-weight: 700;">+${fmtMoney(catSum).replace('−', '')}</div>
          </div>
          ${items.map(e => `<div style="display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-top: 1px dashed rgba(255,255,255,0.04); gap: 8px;">
            <div style="flex: 1; min-width: 0;"><div style="font-size: 11px; color: #b0a0d0;">${formatDateShort(e.date)}${e.note ? ` · ${escapeHtml(e.note)}` : ''}</div></div>
            <div style="font-size: 12px; color: #10E891; font-weight: 600; flex-shrink: 0;">+${fmtMoney(e.amount).replace('−', '')}</div>
            <button onclick="window.__app.removeFinEntry('${e.id}')" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 2px; font-size: 12px; flex-shrink: 0;">✕</button>
          </div>`).join('')}
        </div>`;
      });
      html += '</div>';
    }
  }

  // График динамики последних 6 месяцев
  const last6 = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const ms = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    last6.push({ ms, label: MONTHS_RU_SHORT[d.getMonth()] });
  }
  let maxBar = 0;
  last6.forEach(m => {
    maxBar = Math.max(maxBar, finMonthSum(m.ms, 'income'), finMonthSum(m.ms, 'expense'));
  });
  if (maxBar === 0) maxBar = 1;

  html += `<div style="margin-top: 16px; padding: 14px; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;">
    <div style="font-size: 10px; color: #A78BFA; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; margin-bottom: 12px;">Последние 6 месяцев</div>
    <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; align-items: flex-end; height: 120px;">
      ${last6.map(m => {
        const inc = finMonthSum(m.ms, 'income');
        const exp = finMonthSum(m.ms, 'expense');
        const n = inc - exp;
        const incH = (inc / maxBar) * 100;
        const expH = (exp / maxBar) * 100;
        return `<div style="display: flex; flex-direction: column; align-items: center; gap: 2px; height: 100%; cursor: pointer;" onclick="window.__app.setFinMonth('${m.ms}')" title="${m.label}: +${fmtMoney(inc)} / −${fmtMoney(exp)} = ${fmtMoney(n)}">
          <div style="display: flex; align-items: flex-end; gap: 2px; height: 100%; width: 100%; padding: 0 2px;">
            <div style="flex: 1; height: ${incH}%; background: linear-gradient(180deg, #10E891, #10E89160); border-radius: 3px 3px 0 0; box-shadow: 0 0 4px rgba(16,232,145,0.4);"></div>
            <div style="flex: 1; height: ${expH}%; background: linear-gradient(180deg, #FF3D71, #FF3D7160); border-radius: 3px 3px 0 0; box-shadow: 0 0 4px rgba(255,61,113,0.4);"></div>
          </div>
          <div style="font-size: 9px; color: ${m.ms === monthStr ? '#fff' : '#8870a8'}; text-transform: uppercase; letter-spacing: 0.05em; font-weight: ${m.ms === monthStr ? '700' : '500'};">${m.label}</div>
          <div style="font-size: 8px; color: ${n >= 0 ? '#10E891' : '#FF3D71'}; font-weight: 700;">${n >= 0 ? '+' : ''}${Math.round(n)}</div>
        </div>`;
      }).join('')}
    </div>
    <div style="display: flex; justify-content: center; gap: 12px; margin-top: 10px; font-size: 10px; color: #8870a8;">
      <span><span style="display: inline-block; width: 8px; height: 8px; background: #10E891; border-radius: 2px; vertical-align: middle; margin-right: 4px;"></span>доходы</span>
      <span><span style="display: inline-block; width: 8px; height: 8px; background: #FF3D71; border-radius: 2px; vertical-align: middle; margin-right: 4px;"></span>расходы</span>
    </div>
  </div>`;

  html += `</div>`;
  return html;
}

function renderSphereModal() {
  const s = SPHERES.find(x => x.id === view.sphereId);
  const tasks = state.tasks[s.id];
  const ctx = state.context[s.id];
  const sxp = sphereXP(s.id);
  const sh = sphereHours(s.id);
  const lvl = Math.floor(sxp / 200) + 1;
  const hasContext = ctx && Object.values(ctx).some(v => v && v.trim());

  let tasksHtml = '';
  if (tasks.length === 0) tasksHtml = '<div style="text-align: center; color: #6a5a8a; font-size: 12px; padding: 20px;">Ветвь пуста. Добавь первую задачу.</div>';
  else {
    // Порядок обязательных задач из MANDATORY_TASKS (важно для молитв — по времени дня)
    const mandatoryOrder = (MANDATORY_TASKS[s.id] || []).map(m => m.mandatoryKey);
    const sorted = [...tasks].sort((a, b) => {
      if (a.mandatory && !b.mandatory) return -1;
      if (!a.mandatory && b.mandatory) return 1;
      if (a.mandatory && b.mandatory) {
        const aIdx = mandatoryOrder.indexOf(a.mandatoryKey || a.taskKey);
        const bIdx = mandatoryOrder.indexOf(b.mandatoryKey || b.taskKey);
        return aIdx - bIdx;
      }
      return 0;
    });

    // Рендерер одной задачи — переиспользуется
    const renderTaskRow = (t, opts = {}) => {
      const isHM = t.type === 'hours';
      const xpD = isHM ? `~${xpForHours(t.hours || 1)} XP за ${t.hours || 1}ч` : `+${xpFor(t.difficulty)} XP`;
      const stats = t.repeating ? taskStats(t.taskKey, 'all') : null;
      const lastDateLine = stats && stats.lastDate ? `<div style="font-size: 9px; color: #6a5a8a; margin-top: 2px;">посл. ${formatDateRelative(stats.lastDate)}</div>` : '';
      const statsLine = stats && stats.count > 0
        ? `<div style="font-size: 10px; color: ${s.color}; margin-top: 4px; letter-spacing: 0.05em;">×${stats.count}${stats.hours > 0 ? ` · ${stats.hours.toFixed(1)} ч` : ''} <span style="color: #6a5a8a;">всего</span></div>${lastDateLine}`
        : '';
      const mandatoryBadge = (t.mandatory && !opts.compact) ? `<span style="font-size: 8px; padding: 2px 6px; background: ${s.color}25; color: ${s.color}; border: 1px solid ${s.color}50; border-radius: 6px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-left: 6px; vertical-align: middle;">★ обязат.</span>` : '';
      const bg = opts.compact ? 'rgba(255,255,255,0.02)' : (t.mandatory ? `linear-gradient(135deg, ${s.color}10, transparent)` : 'rgba(255,255,255,0.03)');
      const borderLeft = (t.mandatory && !opts.compact) ? `border-left: 3px solid ${s.color};` : '';
      const deleteBtn = t.mandatory
        ? `<div style="width: 24px; flex-shrink: 0;"></div>`
        : `<button onclick="window.__app.removeTask('${s.id}', '${t.id}')" style="background: transparent; border: none; color: #5a4a78; cursor: pointer; padding: 4px; font-size: 14px;">🗑</button>`;
      return `<div style="display: flex; align-items: center; gap: 10px; padding: ${opts.compact ? '9px' : '11px'}; background: ${bg}; border: 1px solid rgba(255,255,255,0.05); ${borderLeft} border-radius: 10px; margin-bottom: 5px;">
        <button onclick="window.__app.completeQuick('${s.id}', '${t.id}')" style="width: ${opts.compact ? '26px' : '28px'}; height: ${opts.compact ? '26px' : '28px'}; border-radius: 50%; background: transparent; border: 2px solid ${s.color}; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; box-shadow: 0 0 8px ${s.glow};"><span style="color: ${s.color}; font-size: 13px; font-weight: 700;">✓</span></button>
        <div style="flex: 1; min-width: 0;">
          <div style="font-size: ${opts.compact ? '12px' : '13px'}; color: #fff; word-break: break-word;">${escapeHtml(t.title)}${mandatoryBadge}</div>
          ${!opts.compact ? `<div style="font-size: 9px; color: #8870a8; margin-top: 2px;">${xpD} ${t.repeating ? '· ↻' : ''} ${isHM ? '· ◷' : ''}</div>` : ''}
          ${statsLine}
        </div>
        ${deleteBtn}
      </div>`;
    };

    // Если у сферы 4+ обязательных задач — группируем их в свёртку
    const mandatoryTasks = sorted.filter(t => t.mandatory);
    const otherTasks = sorted.filter(t => !t.mandatory);
    const shouldGroup = mandatoryTasks.length >= 4;

    if (shouldGroup) {
      const groupKey = `mandatoryGroup_${s.id}`;
      const isOpen = view.expandedGroups && view.expandedGroups[groupKey];
      // Считаем сколько выполнено за сегодня в этой группе
      const todayStr = today();
      const doneToday = mandatoryTasks.filter(t => state.history.some(h => h.taskKey === t.taskKey && h.date === todayStr)).length;
      const headerLabel = s.id === 'religion' ? 'Молитвы дня' : s.id === 'love' ? 'Связь с близкими' : 'Обязательные задачи';

      tasksHtml += `<button onclick="window.__app.toggleGroup('${groupKey}')" style="width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: linear-gradient(135deg, ${s.color}20, ${s.color}05); border: 1px solid ${s.color}50; border-left: 3px solid ${s.color}; border-radius: 10px; cursor: pointer; margin-bottom: 5px; text-align: left;">
        <div style="font-size: 18px; flex-shrink: 0;">${isOpen ? '▾' : '▸'}</div>

          <div style="font-size: 10px; color: ${s.color}; letter-spacing: 0.1em; margin-top: 2px;">★ ${mandatoryTasks.length} обязат. · сегодня ${doneToday}/${mandatoryTasks.length}</div>
        </div>
        <div style="display: flex; gap: 3px; flex-shrink: 0;">
          ${mandatoryTasks.map(t => {
            const tDone = state.history.some(h => h.taskKey === t.taskKey && h.date === todayStr);
            return `<div style="width: 8px; height: 8px; border-radius: 50%; background: ${tDone ? s.color : 'rgba(255,255,255,0.08)'}; box-shadow: ${tDone ? '0 0 4px ' + s.color : 'none'};"></div>`;
          }).join('')}
        </div>
      </button>`;

      if (isOpen) {
        tasksHtml += `<div style="margin-left: 8px; padding-left: 8px; border-left: 1px dashed ${s.color}40; margin-bottom: 8px;">`;
        tasksHtml += mandatoryTasks.map(t => renderTaskRow(t, { compact: true })).join('');
        tasksHtml += `</div>`;
      }

      // Не-обязательные задачи отдельно
      tasksHtml += otherTasks.map(t => renderTaskRow(t)).join('');
    } else {
      // Старая логика без группировки
      tasksHtml = sorted.map(t => renderTaskRow(t)).join('');
    }
  }

  let addBlock = '';
  if (view.addingTask) {
    const isHM = view.addMode === 'hours';
    addBlock = `<div style="background: rgba(255,255,255,0.04); border: 1px solid ${s.color}40; border-radius: 12px; padding: 14px; margin-bottom: 14px;"><div style="display: flex; gap: 6px; margin-bottom: 12px;"><button onclick="window.__app.setAddMode('simple')" style="flex: 1; padding: 8px; background: ${!isHM ? s.color : 'transparent'}; color: ${!isHM ? '#000' : '#b0a0d0'}; border: 1px solid ${!isHM ? s.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">Сложность</button><button onclick="window.__app.setAddMode('hours')" style="flex: 1; padding: 8px; background: ${isHM ? s.color : 'transparent'}; color: ${isHM ? '#000' : '#b0a0d0'}; border: 1px solid ${isHM ? s.color : 'rgba(255,255,255,0.1)'}; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;">По часам</button></div><input id="task-title-input" placeholder="Что делаем?" style="width: 100%; padding: 10px 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; margin-bottom: 12px; outline: none;" />${!isHM ? `<div style="font-size: 10px; color: #8870a8; letter-spacing: 0.2em; margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Сложность</div><div style="display: flex; gap: 6px; margin-bottom: 12px;" id="diff-row">${[['easy', 'Лёгкая', '10'], ['medium', 'Средняя', '25'], ['hard', 'Сложная', '50']].map(([v, l, x]) => `<button data-diff="${v}" onclick="window.__app.setDiff('${v}')" style="flex: 1; padding: 8px; background: ${v === currentDifficulty ? s.color : 'transparent'}; border: 1px solid ${v === currentDifficulty ? s.color : 'rgba(255,255,255,0.1)'}; color: ${v === currentDifficulty ? '#000' : '#b0a0d0'}; font-size: 10px; border-radius: 8px; cursor: pointer; font-weight: 600;">${l}<br><span style="font-size: 9px; opacity: 0.7;">+${x}</span></button>`).join('')}</div>` : `<div style="background: rgba(0,0,0,0.3); border: 1px solid ${s.color}40; border-radius: 10px; padding: 12px; margin-bottom: 12px;"><div style="font-size: 10px; color: #8870a8; letter-spacing: 0.2em; margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Часов на одно выполнение (по умолчанию)</div><div style="display: flex; align-items: center; gap: 12px;"><input id="hours-input" type="number" min="0.5" max="12" step="0.5" value="1" oninput="window.__app.updateHourPreview()" style="flex: 1; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 16px; outline: none; text-align: center;" /><div style="font-size: 11px; color: #8870a8;">→</div><div id="hour-preview" style="font-size: 16px; color: ${s.color}; font-weight: 700; min-width: 70px; text-align: right;">+25 XP</div></div><div style="font-size: 10px; color: #6a5a8a; margin-top: 8px; line-height: 1.5;">При выполнении сможешь ввести любое число часов. 1ч = 25 XP.</div></div>`}<label style="display: flex; align-items: center; gap: 8px; font-size: 11px; color: #b0a0d0; margin-bottom: 12px; cursor: pointer;"><input id="repeat-check" type="checkbox" checked style="accent-color: ${s.color};" />Повторяющаяся (попадёт в «Учёт»)</label><div style="display: flex; gap: 8px;"><button onclick="window.__app.confirmAddTask('${s.id}')" style="flex: 1; padding: 11px; background: linear-gradient(135deg,${s.color},${s.color}cc); color: #000; border: none; border-radius: 8px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; font-weight: 700; box-shadow: 0 0 16px ${s.glow};">Добавить</button><button onclick="window.__app.cancelAddTask()" style="padding: 11px 16px; background: transparent; color: #8870a8; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-size: 11px; cursor: pointer;">Отмена</button></div></div>`;
    setTimeout(() => document.getElementById('task-title-input')?.focus(), 50);
  } else {
    addBlock = `<button onclick="window.__app.startAddTask()" style="width: 100%; padding: 12px; background: ${s.color}15; border: 1px dashed ${s.color}; border-radius: 10px; color: ${s.color}; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; margin-bottom: 14px; font-weight: 700;">+ Добавить задачу</button>`;
  }

  let contextHtml = '';
  if (hasContext) {
    const visible = view.contextVisible ? QUESTIONS[s.id].map(q => { const v = ctx[q.id]; if (!v || !v.trim()) return ''; return `<div style="margin-bottom: 10px;"><div style="font-size: 10px; color: #8870a8; margin-bottom: 3px; letter-spacing: 0.05em;">${escapeHtml(q.label)}</div><div style="font-size: 12px; color: #d0c0e8; line-height: 1.5;">${escapeHtml(v)}</div></div>`; }).join('') : '';
    contextHtml = `<div style="margin-bottom: 14px;"><button onclick="window.__app.toggleContext()" style="width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: #b0a0d0; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;"><span>Твой контекст</span><span>${view.contextVisible ? '▴' : '▾'}</span></button>${view.contextVisible ? `<div style="margin-top: 6px; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px;">${visible}</div>` : ''}</div>`;
  }

  const financeHtml = s.id === 'money' ? renderFinancePanel(s) : '';
  const hasSkillsForSphere = (state.skills || []).some(sk => (sk.sphereId || 'skills') === s.id);
  const skillsHtml = hasSkillsForSphere ? renderSkillsPanel(s) : '';
  const bodyHtml = s.id === 'body' ? renderBodyPanel(s) : '';

  // Мини-блок прогресса к следующему этапу
  let stageProgressHtml = '';
  const currentStageIdx = PATH.findIndex(st => !state.stagesUnlocked[st.id]);
  if (currentStageIdx > 0 && currentStageIdx < PATH.length) {
    const stage = PATH[currentStageIdx];
    const prog = sphereProgressForStage(s.id, stage.id);
    const targetType = SPHERE_TARGET_TYPE[s.id];
    const unit = targetType === 'hours' ? ' ч' : '';
    const formatNum = n => targetType === 'hours' ? n.toFixed(1) : Math.round(n);
    const isDone = prog.pct >= 100;
    const remaining = Math.max(0, prog.target - prog.current);
    stageProgressHtml = `<div style="background: rgba(0,0,0,0.25); border: 1px solid ${isDone ? s.color + '50' : 'rgba(255,255,255,0.06)'}; border-radius: 10px; padding: 11px 13px; margin-bottom: 14px;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px;">
        <div style="font-size: 10px; color: ${s.color}; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700;">До этапа «${escapeHtml(stage.title)}»</div>
        <div style="font-size: 12px; color: ${isDone ? '#10E891' : '#fff'}; font-weight: 700;">${isDone ? '✓ готово' : `${Math.round(prog.pct)}%`}</div>
